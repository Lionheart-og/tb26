<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TB26 Training">
<meta name="theme-color" content="#0a0a0f">
<title>Training Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #18181f;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #f0f0f8; --muted: #6b6b80;
    --accent: #c8f060; --accent2: #60c8f0; --warn: #f0a060;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
    --z-transition: #f0d060; --z-fresh: #60c8f0; --z-grey: #9090a8; --z-optimal: #60d090; --z-risk: #f06060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  #app { max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem; }
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; }
  .header h1 { font-size: 1.6rem; font-weight: 300; letter-spacing: -0.02em; }
  .header h1 span { color: var(--accent); font-weight: 500; }
  .athlete-chip { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 100px; padding: 6px 14px 6px 6px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #000; }
  .athlete-name { font-size: 13px; color: var(--muted); }
  .status { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 2rem; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  #loading { text-align: center; padding: 4rem 0; }
  .spinner { width: 32px; height: 32px; border: 1.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .load-label { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-top: 1rem; }
  #error { display:none; background:rgba(240,96,96,.08); border:.5px solid rgba(240,96,96,.3); border-radius:12px; padding:1.5rem; }
  #error p { font-size:14px; color:#f09090; line-height:1.6; }
  #error code { font-family:var(--mono); font-size:12px; background:rgba(255,255,255,.05); padding:2px 6px; border-radius:4px; }
  #dashboard { display:none; }

  /* Banner */
  .banner { border-radius: 16px; padding: 1.75rem 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .banner-label { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
  .banner-status { font-size: 1.8rem; font-weight: 300; letter-spacing: -0.02em; }
  .banner-sub { font-size: 13px; color: var(--muted); margin-top: 4px; max-width: 400px; line-height: 1.6; }
  .tsb-big { font-family:var(--mono); font-size:2rem; font-weight:300; padding:10px 20px; border-radius:10px; background:rgba(255,255,255,.04); border:.5px solid var(--border2); }

  /* Metrics */
  .metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:1.5rem; }
  .metric-card { background:var(--bg3); border:.5px solid var(--border); border-radius:12px; padding:1rem 1.25rem; }
  .metric-label { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .metric-value { font-size:1.6rem; font-weight:300; letter-spacing:-0.02em; }
  .metric-sub { font-size:12px; color:var(--muted); margin-top:4px; }
  .badge { font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:100px; font-weight:500; border:.5px solid; }

  /* Zone colours */
  .c-transition { color:var(--z-transition); }
  .c-fresh      { color:var(--z-fresh); }
  .c-grey       { color:var(--z-grey); }
  .c-optimal    { color:var(--z-optimal); }
  .c-risk       { color:var(--z-risk); }

  /* Chart */
  .chart-wrap { background:var(--bg3); border:.5px solid var(--border); border-radius:14px; padding:1.25rem 1.5rem; margin-bottom:1.5rem; }
  .chart-legend { display:flex; gap:16px; margin-bottom:1rem; flex-wrap:wrap; }
  .leg { display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; color:var(--muted); }
  .leg-dot { width:8px; height:8px; border-radius:50%; }

  /* Zone reference */
  .zone-ref { background:var(--bg3); border:.5px solid var(--border); border-radius:12px; padding:1rem 1.25rem; margin-bottom:1.5rem; }
  .zone-ref-title { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; }
  .zone-row { display:flex; align-items:center; gap:10px; font-size:13px; margin-bottom:6px; }
  .zone-row:last-child { margin-bottom:0; }
  .zdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .zname { font-weight:500; min-width:88px; }
  .zrange { font-family:var(--mono); font-size:12px; color:var(--muted); min-width:96px; }
  .zdesc { font-size:12px; color:var(--muted); }

  /* Suggestion */
  .suggestion { background:var(--bg3); border:.5px solid var(--border2); border-radius:14px; padding:1.5rem; margin-bottom:1.5rem; }
  .sug-head { display:flex; align-items:center; gap:10px; margin-bottom:1rem; }
  .sug-icon { font-size:20px; }
  .sug-title { font-size:15px; font-weight:500; }
  .sug-body { font-size:14px; color:var(--muted); line-height:1.7; }
  .sug-body strong { color:var(--text); font-weight:400; }
  .pills { display:flex; flex-wrap:wrap; gap:8px; margin-top:1rem; }
  .pill { font-family:var(--mono); font-size:12px; padding:5px 12px; border-radius:100px; border:.5px solid var(--border2); color:var(--muted); background:var(--bg2); }
  .pill.p1 { border-color:rgba(200,240,96,.4); color:var(--accent); background:rgba(200,240,96,.06); }
  .pill.p2 { border-color:rgba(96,200,240,.4); color:var(--accent2); background:rgba(96,200,240,.06); }

  /* Activities */
  .sec-title { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:1rem; }
  .act-list { display:flex; flex-direction:column; gap:8px; margin-bottom:1.5rem; }
  .act-row { background:var(--bg3); border:.5px solid var(--border); border-radius:10px; padding:.9rem 1.2rem; display:flex; align-items:center; gap:1rem; }
  .act-emoji { font-size:18px; min-width:28px; }
  .act-info { flex:1; min-width:0; }
  .act-name { font-size:14px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .act-meta { font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px; }
  .act-load { font-family:var(--mono); font-size:13px; color:var(--muted); text-align:right; white-space:nowrap; }
  .act-load span { display:block; font-size:11px; opacity:.6; }

  /* ── Mobile / Touch Responsive ────────────────────────────────────────── */
  @media(max-width:760px){
    #app { padding: 1.25rem 1rem; }
    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.3rem; }
    .status { margin-bottom: 1.25rem; }
    .banner { padding: 1.25rem 1.25rem; border-radius: 12px; }
    .banner-status { font-size: 1.4rem; }
    .tsb-big { font-size: 1.5rem; padding: 8px 14px; }
    .banner-sub { max-width: 100%; }
    .metrics-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .metric-value { font-size: 1.35rem; }
    .chart-wrap { padding: 1rem 1rem; }
    .zone-ref { padding: 1rem 1rem; }
    .suggestion { padding: 1.25rem 1.25rem; }
    .act-row { padding: .75rem 1rem; }
    .zname { min-width: 70px; }
    .zrange { min-width: 80px; }
  }


  @media(max-width:500px){
    #app { padding: 1rem 0.75rem; }
    .header { gap: 0.5rem; margin-bottom: 1.25rem; }
    .header h1 { font-size: 1.15rem; }
    .athlete-name { display: none; } /* show avatar only, save space */
    .banner { flex-direction: column; align-items: flex-start; gap: 0.75rem; padding: 1rem 1rem; }
    .banner-status { font-size: 1.25rem; }
    .tsb-big { font-size: 1.4rem; align-self: flex-start; }
    /* 5-col metrics → 2+3 wrap on phone */
    .metrics-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }
    .metric-card { padding: 0.85rem 1rem; }
    .metric-value { font-size: 1.25rem; }
    .metric-sub { font-size: 11px; }
    .chart-wrap { padding: 0.875rem 0.875rem; border-radius: 12px; }
    .chart-legend { gap: 10px; }
    .leg { font-size: 10px; }
    .zone-ref { padding: 0.875rem 0.875rem; }
    .zone-row { font-size: 12px; gap: 8px; }
    .zname { min-width: 58px; font-size: 12px; }
    .zrange { min-width: 70px; font-size: 11px; }
    .zdesc { font-size: 11px; }
    .suggestion { padding: 1rem 1rem; }
    .sug-body { font-size: 13px; }
    .pills { gap: 6px; }
    .pill { font-size: 11px; padding: 4px 10px; }
    .act-row { padding: .7rem .875rem; gap: .75rem; }
    .act-name { font-size: 13px; }
    .act-meta { font-size: 10px; }
    .act-load { font-size: 12px; }
    .sec-title { font-size: 10px; }
    .badge { font-size: 9px; }
  }

  /* ── TP Grid: always horizontally scrollable on mobile ── */
  #tp-visual-wrap { -webkit-overflow-scrolling: touch; }

  /* ── Metric card tooltip ── */
  .metric-card { position: relative; }
  .metric-card[data-tip]:hover { border-color: var(--border2); }
  #metric-tooltip {
    position: fixed; z-index: 9999; pointer-events: none;
    background: #16161e; border: .5px solid rgba(255,255,255,0.14);
    border-radius: 14px; padding: 14px 16px;
    width: 300px; max-width: 92vw;
    font-family: var(--sans); font-size: 12px; color: var(--text);
    line-height: 1.65; box-shadow: 0 16px 40px rgba(0,0,0,0.65);
    display: none; transition: opacity 0.1s;
  }
  #metric-tooltip .tip-title {
    font-size: 13px; font-weight: 500; margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  #metric-tooltip .tip-formula {
    font-family: var(--mono); font-size: 11px;
    background: rgba(255,255,255,0.05); border-radius: 6px;
    padding: 7px 10px; margin: 8px 0; color: var(--accent2);
    border-left: 2px solid rgba(96,200,240,0.5);
  }
  #metric-tooltip .tip-body { color: var(--muted); font-size: 12px; line-height: 1.7; }
  #metric-tooltip .tip-zones { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  #metric-tooltip .tip-zone { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; }
  #metric-tooltip .tip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  @media(max-width:760px){
    .metrics-grid-5 { grid-template-columns: repeat(3, 1fr) !important; }
  }
  @media(max-width:500px){
    .metrics-grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
  }

  /* ── Touch targets + iOS zoom prevention ── */
  @media(max-width:760px){
    button {
      min-height: 44px;
      padding-left: 14px !important;
      padding-right: 14px !important;
      font-size: 14px !important;
      touch-action: manipulation;
    }
    input[type=text], input[type=number] {
      font-size: 16px !important;
      min-height: 44px;
      touch-action: manipulation;
    }
    #token-input { min-height: 44px; font-size: 14px !important; }
  }

  /* ── Action buttons (Strava / Calendar) — week cards + today block ── */
  .btn-strava {
    font-family: var(--mono); font-size: 10px; padding: 4px 10px;
    border-radius: 100px; border: .5px solid rgba(200,240,96,0.35);
    background: rgba(200,240,96,0.07); color: var(--accent);
    cursor: pointer; white-space: nowrap; touch-action: manipulation;
  }
  .btn-cal {
    font-family: var(--mono); font-size: 10px; padding: 4px 10px;
    border-radius: 100px; border: .5px solid rgba(96,200,240,0.35);
    background: rgba(96,200,240,0.07); color: var(--accent2);
    cursor: pointer; white-space: nowrap; touch-action: manipulation;
  }
  @media(max-width:500px){
    .btn-strava, .btn-cal {
      font-size: 11px !important;
      padding: 8px 12px !important;
      min-height: 38px;
    }
  }
  @supports(padding: env(safe-area-inset-bottom)){
    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    #app {
      padding-bottom: calc(1rem + env(safe-area-inset-bottom));
    }
  }

</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Training <span>Intelligence</span></h1>
    <div id="athlete-chip" class="athlete-chip" style="display:none">
      <div class="avatar" id="avatar-initials">?</div>
      <span class="athlete-name" id="athlete-name-label"></span>
    </div>
  </div>
  <div class="status"><div class="status-dot"></div><span id="status-text">Connecting to Strava...</span></div>
  <div id="loading"><div class="spinner"></div><div class="load-label">Fetching your activities...</div></div>
  <div id="error"><p id="error-msg"></p></div>
  <div id="dashboard"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
// Trans Baviaans 2026 Training Intelligence Dashboard
// Sub-11hr goal | Periodized plan | Strava push | Google Calendar | FTP | Consistency streak

// ── SA Public Holidays (training window Mar–Aug 2026) ─────────────────────────
const SA_HOLIDAYS = new Set([
  '2026-03-21', // Human Rights Day (Sat, no Mon sub)
  '2026-04-03', // Good Friday
  '2026-04-06', // Family Day
  '2026-04-27', // Freedom Day
  '2026-05-01', // Workers' Day
  '2026-06-16', // Youth Day
  '2026-08-09', // National Women's Day (Sun → Mon 10th observed)
  '2026-08-10', // National Women's Day observed
]);

// Returns YYYY-MM-DD in LOCAL time — avoids UTC-offset date-shift bugs
function localDateKey(date) {
  const d = date instanceof Date ? date : new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}

function isHoliday(date) {
  return SA_HOLIDAYS.has(localDateKey(date));
}
function isWeekend(date) {
  return date.getDay() === 0 || date.getDay() === 6;
}
function isLongRideDay(date) {
  return isWeekend(date) || isHoliday(date);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function emoji(t) {
  return ({Run:'🏃',Ride:'🚴',Swim:'🏊',Walk:'🚶',Hike:'🥾',VirtualRide:'🚴',
    VirtualRun:'🏃',WeightTraining:'🏋️',Yoga:'🧘',Workout:'💪',Rowing:'🚣',
    CrossFit:'🏋️',EBikeRide:'⚡',NordicSki:'⛷️',AlpineSki:'🎿'})[t] || '🏅';
}

// ── Training Load (TSS) ───────────────────────────────────────────────────────
// Priority 1: Power-based TSS — most accurate
//   TSS = (duration_s × NP × IF) / (FTP × 3600) × 100,  IF = NP / FTP
//   Uses weighted_average_watts (NP proxy) when available, else average_watts
//
// Priority 2: Strava Suffer Score proxy
//   Suffer score correlates well with hrTSS. Strava's internal model uses your
//   actual HR zones. Empirically: TSS ≈ suffer_score × 1.2 (well-validated ratio)
//
// Priority 3: HR-based TSS (hrTSS)
//   hrTSS = hrs × (hrFrac²) × 100,  hrFrac = (HR_avg − HR_rest)/(LTHR − HR_rest)
//   LTHR default = 175 (higher than previous 162 — most trained cyclists 168-180)
//
// Priority 4: Duration estimate
const HR_REST      = 50;
const HR_THRESHOLD = 175; // default LTHR — overridden by Strava zones via window._HR_THRESHOLD

function load(a) {
  const secs = a.moving_time || 0;
  const hrs  = secs / 3600;
  if (hrs < 0.08) return 0;

  const ftp  = window._lastFtp || 200;
  const lthr = window._HR_THRESHOLD || HR_THRESHOLD;
  const t    = a.sport_type || a.type || '';

  // Non-cycling activities — use suffer score or HR only, no power path
  const isCycling = t.includes('Ride') || t === 'VirtualRide';

  // ── 1. Power TSS (cycling with power data) ───────────────────────────────
  if (isCycling && ftp > 100) {
    const np = a.weighted_average_watts || a.average_watts || 0;
    if (np > 50) {
      const IF  = np / ftp;
      const tss = (secs * np * IF) / (ftp * 3600) * 100;
      return Math.round(Math.min(tss, 450));
    }
  }

  // ── 2. Suffer score proxy (all activity types) ───────────────────────────
  const suffer = a.suffer_score || 0;
  if (suffer > 5) {
    return Math.round(Math.min(suffer * 1.2, 400));
  }

  // ── 3. HR-based TSS ──────────────────────────────────────────────────────
  const hr = a.average_heartrate || 0;
  if (hr > HR_REST + 10) {
    const hrFrac = Math.max(0, (hr - HR_REST) / (lthr - HR_REST));
    const hrTSS  = hrs * Math.pow(Math.min(hrFrac, 1.3), 2) * 100;
    return Math.round(Math.min(hrTSS, 350));
  }

  // ── 4. Duration estimate ─────────────────────────────────────────────────
  if (t === 'Swim')                       return Math.round(hrs * 55);
  if (isCycling)                          return Math.round(hrs * 45);
  if (t === 'Run' || t === 'VirtualRun')  return Math.round(hrs * 60);
  if (t === 'Walk' || t === 'Hike')       return Math.round(hrs * 20);
  return Math.round(hrs * 30);
}

function fmtDist(m,t){ if(!m)return'—'; return t==='Swim'?Math.round(m)+'m':(m/1000).toFixed(1)+'km'; }
function fmtDur(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h ${m}m`:`${m}m`; }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }

// ── FTP / eFTP ────────────────────────────────────────────────────────────────
// Fallback constant — only used if no power rides found
// if recent form suggests a higher number; otherwise fall back to 265W baseline.
const KNOWN_EFTP = 265; // fallback — not actively used
// Athlete weight — reads from localStorage so it persists across sessions
function getAthleteWeight() {
  const stored = parseFloat(localStorage.getItem('athlete_weight_kg'));
  return (stored && stored > 30 && stored < 200) ? stored : 75;
}
function setAthleteWeight(kg) {
  localStorage.setItem('athlete_weight_kg', kg);
}
let ATHLETE_WEIGHT_KG = getAthleteWeight();

// ── eFTP calculation ──────────────────────────────────────────────────────────
// Science: The gold-standard FTP test is a 60-min maximal effort. In practice,
// a 20-min all-out effort × 0.95 is the most widely validated proxy (Allen &
// Coggan, "Training and Racing with a Power Meter"). The 5% discount accounts
// for the anaerobic contribution that is higher over 20 min than 60 min.
//
// We find the single best 20-min-equivalent effort from the last 90 days:
//   • Rides ≥ 20 min: apply duration-scaling so any ride length can contribute
//   • Best scaled value × 0.95 = eFTP
// Duration scaling (Monod & Scherrer power-duration relationship):
//   P_20 ≈ P_actual × (t_actual / 1200) ^ 0.07   for rides 20-120 min
// This is physiologically grounded and consistent with academic literature.

function estimateFTP(activities, ctl) {
  // Use both type and sport_type to catch all ride variants
  const isRide = a => ['Ride','VirtualRide','MountainBikeRide','GravelRide']
    .includes(a.sport_type || a.type);
  const cutoff = Date.now() - 90 * 86400000;

  const powRides = activities.filter(a =>
    isRide(a) &&
    new Date(a.start_date).getTime() > cutoff &&
    a.moving_time >= 1200  // ≥ 20 min
  );

  // Prefer weighted_average_watts (NP proxy) — much closer to actual FTP
  // than average_watts which includes coasting/descents
  const withPower = powRides.filter(a =>
    (a.weighted_average_watts || a.average_watts || 0) > 80
  );

  if (withPower.length >= 1) {
    const estimates = withPower.map(a => {
      const np   = a.weighted_average_watts || a.average_watts;
      const secs = a.moving_time;

      // Monod-Scherrer power-duration model:
      // P(t) = FTP × (3600/t)^0.07
      // → FTP estimate = NP / (3600/t)^0.07 = NP × (t/3600)^0.07
      //
      // This scales the observed NP DOWN to a 60-min FTP equivalent.
      // Short hard rides scale down less; long easy rides scale down more.
      // Valid range: 20 min–3 hr. Beyond 3hr the model loses accuracy.
      const t     = Math.min(secs, 10800); // cap at 3hr for validity
      const ftpEst = np * Math.pow(t / 3600, 0.07);

      return { ftpEst: Math.round(ftpEst), np, secs, name: a.name,
               date: a.start_date.slice(0,10) };
    });

    const best = estimates.reduce((a,b) => a.ftpEst > b.ftpEst ? a : b);

    if (best.ftpEst >= 100 && best.ftpEst <= 600) {
      return {
        watts: best.ftpEst,
        method: 'best_20min',
        p20: best.np,
        n: withPower.length,
        bestRide: best.name,
        bestDate: best.date
      };
    }
  }

  // No power data — rough estimate from CTL
  if (ctl && ctl > 20) {
    return { watts: Math.min(Math.round(ctl * 3.2 + 50), 400), method: 'ctl' };
  }
  return { watts: 200, method: 'none' };
}

// W/kg based on 42-day CTL-weighted average load and known eFTP
// Returns watts per kg at current eFTP
function calcWattsPerKg(ftpWatts) {
  if (!ftpWatts || !ATHLETE_WEIGHT_KG) return null;
  return (ftpWatts / ATHLETE_WEIGHT_KG).toFixed(1);
}

// ── Consistency Streak ────────────────────────────────────────────────────────
// Count consecutive ISO weeks (Mon–Sun) with at least 1 activity each
function calcConsistencyStreak(activities) {
  if (!activities.length) return { streak: 0, totalActiveWeeks: 0 };

  // Build set of week keys "YYYY-Www" for each activity
  const weekSet = new Set();
  activities.forEach(a => {
    const d = new Date(a.start_date);
    // ISO week: get Monday of that week
    const day = d.getDay() || 7;
    const monday = new Date(d);
    monday.setDate(d.getDate() - day + 1);
    monday.setHours(0,0,0,0);
    weekSet.add(localDateKey(monday));
  });

  const weeks = Array.from(weekSet).sort().reverse(); // most recent first
  if (!weeks.length) return { streak: 0, totalActiveWeeks: 0 };

  // Get this week's Monday
  const today = new Date(); today.setHours(0,0,0,0);
  const dayOfWeek = today.getDay() || 7;
  const thisMonday = new Date(today);
  thisMonday.setDate(today.getDate() - dayOfWeek + 1);
  const thisKey = localDateKey(thisMonday);

  // Count streak of consecutive weeks going back from most recent active week
  let streak = 0;
  let checkMonday = new Date(thisMonday);

  // Allow current week to count even if not finished
  for (let i = 0; i < 52; i++) {
    const key = localDateKey(checkMonday);
    if (weekSet.has(key)) {
      streak++;
      checkMonday.setDate(checkMonday.getDate() - 7);
    } else if (i === 0) {
      // This week might not have activity yet — look back one more
      checkMonday.setDate(checkMonday.getDate() - 7);
    } else {
      break;
    }
  }

  return { streak, totalActiveWeeks: weekSet.size };
}

// ── EWMA Metrics (Intervals.icu methodology) ─────────────────────────────────
// CTL requires ~6 months of history to converge from 0.
// Intervals.icu uses your full training history; we approximate with 180 days.
// The extra 90 days (days 180→90) seed CTL/ATL so the displayed 90 days are accurate.
function computeMetrics(activities) {
  const byDay = {};
  for (const a of activities) {
    const k = localDateKey(new Date(a.start_date));
    byDay[k] = (byDay[k]||0) + load(a);
  }
  const today = new Date(); today.setHours(0,0,0,0);
  let ctl=0, atl=0;
  const hist = [];
  // Run EWMA for 180 days; only record last 90 for chart/display
  for (let i=179; i>=0; i--) {
    const d  = new Date(today); d.setDate(d.getDate()-i);
    const dk = localDateKey(d);
    const dl = byDay[dk] || 0;
    const form = Math.round(ctl - atl);
    ctl += (dl - ctl) / 42;
    atl += (dl - atl) / 7;
    if (i < 90) hist.push({ date:new Date(d), ctl:Math.round(ctl), atl:Math.round(atl), form, load:dl });
  }
  return { fitness:Math.round(ctl), fatigue:Math.round(atl), form:Math.round(ctl-atl), hist };
}

//   + all existing goal fields

// Backward compatible: if old race_goal_v1 exists, auto-migrates to goals_v2.

function makeGoalId() {
  return 'g' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

function loadGoals() {
  try {
    const stored = localStorage.getItem(GOALS_SK);
    if (stored) {
      const arr = JSON.parse(stored);
      if (Array.isArray(arr) && arr.length) return arr;
    }
    // Migrate from legacy single-goal
    const legacy = localStorage.getItem(GOAL_SK);
    if (legacy) {
      const g = { ...GOAL_DEFAULTS, ...JSON.parse(legacy), priority:'A', id: makeGoalId() };
      saveGoals([g]);
      return [g];
    }
  } catch(e) {}
  const def = { ...GOAL_DEFAULTS, priority:'A', id: makeGoalId() };
  saveGoals([def]);
  return [def];
}

function saveGoals(arr) {
  try { localStorage.setItem(GOALS_SK, JSON.stringify(arr)); } catch(e) {}
}

// Primary (A) goal — the earliest upcoming A-priority goal drives training plan
function loadGoal() {
  const goals = loadGoals();
  const aGoals = goals.filter(g => g.priority && g.priority.startsWith('A'))
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  return aGoals[0] || goals[0] || { ...GOAL_DEFAULTS, id: makeGoalId() };
}

// Legacy compat
function saveGoal(g) {
  const goals = loadGoals();
  const idx   = goals.findIndex(x => x.priority === 'A1' || x.priority === 'A');
  if (idx >= 0) goals[idx] = { ...goals[idx], ...g };
  else goals.unshift({ ...g, priority:'A', id: makeGoalId() });
  saveGoals(goals);
}

// Get current race date from goal settings
function getRaceDate() {
  const g = loadGoal();
  return new Date(g.date + 'T06:00:00');
}

function daysToRace() {
  return Math.ceil((getRaceDate() - new Date()) / 86400000);
}

// Estimate required W/kg to achieve time goal
// Uses simplified cycling power model:
//   Power ≈ (mass × g × gradient_avg + Cd×A×v²×0.5×rho) × v  +  rolling resistance
// Simplified to: avg_speed = distance/time, then estimate FTP needed
function calcTargetWkg(goal, weightKg) {
  const weightG = weightKg || ATHLETE_WEIGHT_KG || 75;
  const avgSpeedMs = (goal.distance * 1000) / (goal.timeGoal * 3600);
  const avgSpeedKmh = goal.distance / goal.timeGoal;
  // Climbing power: P_climb = m × g × (elev/dist_m) × v
  const grade = goal.elevation / (goal.distance * 1000); // avg gradient fraction
  const g = 9.81;
  const Paero = 0.5 * 1.2 * 0.32 * avgSpeedMs * avgSpeedMs * avgSpeedMs; // CdA=0.32, rho=1.2
  const Pclimb = weightG * g * grade * avgSpeedMs;
  const Proll  = 0.004 * weightG * g * avgSpeedMs; // Crr=0.004
  const Ptotal = (Paero + Pclimb + Proll) * 1.08; // 8% drivetrain loss
  // Race power is ~65% of FTP for ultra-endurance events
  const ftpRequired = Ptotal / 0.65;
  return (ftpRequired / weightG).toFixed(2);
}

// Finish time string from start time + goal hours
function calcFinishTime(goal) {
  const [h, m] = (goal.startTime || '10:00').split(':').map(Number);
  const totalMins = h * 60 + m + goal.timeGoal * 60;
  const fh = Math.floor(totalMins / 60) % 24;
  const fm = Math.round(totalMins % 60);
  return fh.toString().padStart(2,'0') + ':' + fm.toString().padStart(2,'0');
}

// ── Goal Readiness Score ──────────────────────────────────────────────────────
// Composite score (0–100) factoring in:
//  1. W/kg gap — how close current W/kg is to target (40% weight)
//  2. CTL fitness — how close to race-ready CTL of 85 (30% weight)
//  3. MTB specificity — % of recent rides that are outdoor MTB vs indoor (30% weight)
// Each component scored 0–100, weighted sum = overall readiness.
// Also projects current W/kg trajectory to race day based on trend.

function calcGoalReadiness(currentWkg, currentCtl, activities, goal, weightKg) {
  const targetWkg    = parseFloat(calcTargetWkg(goal, weightKg));
  const raceCtlTarget = 85;
  const daysLeft     = daysToRace();
  const ftpWatts     = currentWkg * weightKg;
  const raceType     = (goal.raceType || 'mtb').toLowerCase();

  // ── Component 1: W/kg via Power Decay Curve (40%) ────────────────────────
  const raceSecs     = goal.timeGoal * 3600;
  const ftpSecs      = 3600;
  const decayExp     = 0.07;
  const decayFactor  = Math.pow(ftpSecs / raceSecs, decayExp);
  const sustainableW = ftpWatts * decayFactor;
  const sustainableWkg = sustainableW / weightKg;
  const wkgRatio   = Math.min(sustainableWkg / targetWkg, 1.2);
  const wkgScore   = Math.min(100, Math.round(wkgRatio * 100));

  // ── Component 2: CTL fitness (30%) ───────────────────────────────────────
  const ctlRatio   = Math.min(currentCtl / raceCtlTarget, 1.2);
  const ctlScore   = Math.min(100, Math.round(ctlRatio * 100));

  // ── Component 3: Race-type specificity (30%) ─────────────────────────────
  // Strava returns TWO type fields:
  //   a.type       — legacy field, always present
  //   a.sport_type — newer field (API v3 2022+), more specific
  // We check BOTH to ensure MTB rides tagged as sport_type:'MountainBikeRide'
  // are caught even if type:'Ride' (which Strava sometimes returns for MTB).
  const cutoff90     = Date.now() - 90 * 86400000;
  const actType = a => a.sport_type || a.type; // prefer sport_type if present
  const outdoorRides = activities.filter(a => {
    const t = actType(a);
    return ['Ride','MountainBikeRide','GravelRide'].includes(t) &&
      a.trainer !== true && a.trainer !== 1 &&
      new Date(a.start_date).getTime() > cutoff90;
  });
  const specificTypes = {
    mtb:    ['MountainBikeRide'],
    gravel: ['GravelRide', 'MountainBikeRide'],
    road:   ['Ride', 'GravelRide'],
  };
  const relevantTypes  = specificTypes[raceType] || specificTypes.mtb;
  const specificRides  = outdoorRides.filter(a => relevantTypes.includes(actType(a)));
  const specRatio      = outdoorRides.length > 0 ? specificRides.length / outdoorRides.length : 0;
  const specScore      = Math.round(specRatio * 100);

  // ── Composite score (verified: 40% + 30% + 30% = 100%) ───────────────────
  const composite  = Math.round(wkgScore * 0.40 + ctlScore * 0.30 + specScore * 0.30);

  // ── Phase-aware advice ────────────────────────────────────────────────────
  const phase = currentPhase();
  const phaseName = phase ? phase.name : 'Base';
  const weeksLeft = Math.round(daysLeft / 7);
  const raceLabel = raceType === 'road' ? 'road' : raceType === 'gravel' ? 'gravel' : 'MTB';

  let status, statusCol, advice;
  if (composite >= 80) {
    status = 'On Track'; statusCol = '#60d090';
    const phaseAdvice = {
      'Base 1':  'Solid aerobic base building. Keep the long rides truly Zone 1 and let the torque intervals do their work.',
      'Base 2':  'Sub-threshold blocks are building your engine. Stay disciplined on intensity — don\'t push the easy days.',
      'Build 1': 'Threshold phase — the hard work is paying off. Execute the intervals well and recover fully between.',
      'Build 2': 'Stochastic work is sharpening race-specific fitness. Every quality session now counts double.',
      'Peak':    'Peak phase — form is building. Stay sharp, back off the volume, trust what you\'ve built.',
      'Taper':   'Taper underway. Resist the urge to do more — freshness is performance now.',
      'Race Week':'Race week. Easy legs, sharp mind. You\'re ready.',
    };
    advice = phaseAdvice[phaseName] || 'Strong position. ' + weeksLeft + ' weeks to race — maintain consistency.';
  } else if (composite >= 60) {
    status = 'Building'; statusCol = '#c8f060';
    const phaseAdvice = {
      'Base 1':  'Good start. Prioritise consistency over intensity — the base you build now compounds over ' + weeksLeft + ' weeks.',
      'Base 2':  'Aerobic engine developing. Add one extra long ' + raceLabel + ' ride this block if schedule allows.',
      'Build 1': 'Threshold work beginning — this is where fitness accelerates. Execute every interval session.',
      'Build 2': 'Good progress but ' + weeksLeft + ' weeks remain. Push the specificity — more outdoor ' + raceLabel + ' time.',
      'Peak':    'Close to the mark. Nail the peak sessions and the taper will bring you to race fitness.',
      'Taper':   'Good shape going into taper. Trust the process — fatigue will drop and fitness will show.',
      'Race Week':'Final prep. Short sharp activation, eat well, sleep well.',
    };
    advice = phaseAdvice[phaseName] || 'Good progress. Focus on quality sessions and ' + raceLabel + ' specificity.';
  } else if (composite >= 40) {
    status = 'Developing'; statusCol = '#f0a060';
    const phaseAdvice = {
      'Base 1':  'Early days — the gap is closeable. Commit to the base work and avoid skipping long rides.',
      'Base 2':  'Volume needs to increase. Every week of consistent riding now is worth three weeks closer to race day.',
      'Build 1': 'Fitness needs a boost. Prioritise interval quality and add outdoor ' + raceLabel + ' sessions.',
      'Build 2':  weeksLeft + ' weeks left — time to be strategic. More hours on the bike, specifically outdoors.',
      'Peak':    'Peak phase with a gap to close. Maximum quality in remaining sessions.',
      'Taper':   'Going into taper slightly underprepared — race smart, conserve energy early.',
      'Race Week':'Focus on execution. Ride your own race, pace conservatively early.',
    };
    advice = phaseAdvice[phaseName] || 'More outdoor ' + raceLabel + ' time needed. Increase volume and specificity.';
  } else {
    status = 'Early Stage'; statusCol = '#f06060';
    advice = 'Significant ground to cover in ' + weeksLeft + ' weeks. Consistent daily training is the only path — prioritise it above everything else.';
  }

  const specLabel = raceType === 'road' ? 'Road' : raceType === 'gravel' ? 'Gravel' : 'MTB';

  return {
    score: composite, status, statusCol, advice,
    wkgScore, ctlScore, specScore,
    targetWkg,
    currentWkg: +currentWkg.toFixed(2),
    sustainableWkg: +sustainableWkg.toFixed(2),
    decayFactor: +decayFactor.toFixed(3),
    wkgGap: +(targetWkg - sustainableWkg).toFixed(2),
    mtbPct: Math.round(specRatio * 100),
    specLabel,
    outdoorTotal: outdoorRides.length,
    specificTotal: specificRides.length,
    weeksLeft,
  };
}
// Plan always anchors to race date — phases calculated backwards from race day.
// This means changing the race date automatically reshuffles the entire plan.

function getPlanStartMonday() {
  // Work backwards from race date: 22 weeks before race = plan start
  const race = getRaceDate();
  const planStart = new Date(race);
  planStart.setDate(race.getDate() - 22 * 7);
  // Snap to Monday
  const day = planStart.getDay() || 7;
  planStart.setDate(planStart.getDate() - day + 1);
  planStart.setHours(0,0,0,0);
  // If that puts plan start in the past by more than 22 weeks,
  // use current Monday as fallback anchor
  const now = new Date(); now.setHours(0,0,0,0);
  const weeksToRace = Math.floor((race - now) / (7*86400000));
  if (weeksToRace >= 22) return planStart;
  // Already into the plan — use current week's Monday
  const d = new Date(now);
  const dow = d.getDay() || 7;
  d.setDate(d.getDate() - dow + 1);
  return d;
}
const PLAN_MONDAY = getPlanStartMonday();

function getPeriodPhase(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const week = Math.floor((d - PLAN_MONDAY) / (7*86400000));
  const pw = getPhaseWeeks();
  if (week < 0)          return null;
  if (week < pw['Base 1'])  return {name:'Base 1',  color:'#4a9eff',bg:'rgba(74,158,255,0.12)', border:'rgba(74,158,255,0.35)', desc:'Aerobic foundation — long steady rides, build weekly volume'};
  if (week < pw['Base 2'])  return {name:'Base 2',  color:'#60c8f0',bg:'rgba(96,200,240,0.12)', border:'rgba(96,200,240,0.35)', desc:'Endurance extension — introduce climbing, 4–5hr rides'};
  if (week < pw['Build 1']) return {name:'Build 1', color:'#c8f060',bg:'rgba(200,240,96,0.12)', border:'rgba(200,240,96,0.35)', desc:'Intensity introduction — threshold intervals + long rides'};
  if (week < pw['Build 2']) return {name:'Build 2', color:'#f0a060',bg:'rgba(240,160,96,0.12)', border:'rgba(240,160,96,0.35)', desc:'Race-specific fitness — back-to-back long rides, night riding'};
  if (week < pw['Peak'])    return {name:'Peak',    color:'#f060a0',bg:'rgba(240,96,160,0.12)', border:'rgba(240,96,160,0.35)', desc:'Highest load block — simulate race conditions, max CTL'};
  if (week < pw['Taper'])   return {name:'Taper',   color:'#60d090',bg:'rgba(96,208,144,0.12)', border:'rgba(96,208,144,0.35)', desc:'Load reduction — maintain sharpness, arrive fresh'};
  const totalW = totalPlanWeeks() - 1;
  if (week === totalW)  return {name:'Race Week',color:'#f0d060',bg:'rgba(240,208,96,0.15)',border:'rgba(240,208,96,0.5)',  desc:'Race day — execute the plan'};
  return null;
}
function currentPhase(){ return getPeriodPhase(new Date()); }

// ── Weekly plan engine ────────────────────────────────────────────────────────

// Generate the 7-day plan for a given date's week, respecting constraints
function generateWeekPlan(referenceDate) {
  const d   = new Date(referenceDate); d.setHours(0,0,0,0);
  const day = d.getDay() || 7;
  const mon = new Date(d); mon.setDate(d.getDate() - day + 1);

  const phase = getPeriodPhase(mon) || getPeriodPhase(d);
  if (!phase) return [];

  const plan = PHASE_PLANS[phase.name] || PHASE_PLANS['Base 1'];
  const tc   = loadTrainingConfig();
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const result = [];

  // Build day-role map from training config
  const roles = {
    [tc.restDay]:         'rest',
    [tc.interval1Day]:    'interval1',
    [tc.interval2Day]:    'interval2',
    [tc.strength1Day]:    'strength1',
    [tc.strength2Day]:    'strength2',
    [tc.longRideDay]:     'long',
    [tc.recoveryRideDay]: 'recovery',
  };

  // Weekday session cap from config (minutes)
  const wdCap = tc.weekdaySessionCap || 90;

  days.forEach((dayName, i) => {
    const date = new Date(mon); date.setDate(mon.getDate() + i);
    const isHol  = isHoliday(date);
    const isLong = isLongRideDay(date); // weekend or holiday
    let session;

    const role = roles[dayName] || 'rest';

    if (isLong) {
      // Weekend / holiday — long ride regardless of assigned role
      if (role === 'recovery' || dayName === tc.recoveryRideDay) {
        session = { ...plan.weekend.sun, intensity: plan.weekend.sun.mins >= 150 ? 'moderate' : 'easy' };
      } else {
        session = { ...plan.weekend.sat, intensity: plan.weekend.sat.mins >= 300 ? 'hard' : plan.weekend.sat.mins > 0 ? 'moderate' : 'easy',
          ...(isHol ? { type: plan.weekend.sat.type + ' (Holiday bonus)', isHoliday: true } : {}) };
      }
    } else {
      switch(role) {
        case 'rest':
          session = { type:'Rest / Recovery', icon:'🛌', mins:0, intensity:'easy',
            detail: isHol ? '🎉 Public holiday — rest or optional easy spin 30min' : 'Full rest — absorb weekend load',
            strava:null, isHoliday: isHol };
          break;
        case 'interval1': {
          const s = plan.intervals.tue;
          const mins = Math.min(s.mins, wdCap);
          session = { ...s, mins, intensity: mins >= 75 ? 'hard' : 'moderate', isInterval: true };
          break;
        }
        case 'interval2': {
          const s = plan.intervals.thu;
          const mins = Math.min(s.mins, wdCap);
          session = { ...s, mins, intensity: mins >= 75 ? 'hard' : 'moderate', isInterval: true };
          break;
        }
        case 'strength1':
          if (tc.includeStrength && tc.strengthPhases.includes(phase.name)) {
            const s = plan.strength.wed;
            session = { ...s, mins: Math.min(s.mins||60, wdCap), intensity:'moderate', isGym: true };
          } else {
            session = { type:'Rest / Active Recovery', icon:'🛌', mins:0, intensity:'easy',
              detail:'Rest or light mobility work', strava:null };
          }
          break;
        case 'strength2':
          if (tc.includeStrength && tc.strengthPhases.includes(phase.name)) {
            const s = plan.strength.fri;
            session = { ...s, mins: Math.min(s.mins||60, wdCap), intensity:'moderate', isGym: true };
          } else {
            session = { type:'Rest / Active Recovery', icon:'🛌', mins:0, intensity:'easy',
              detail:'Rest or light mobility work', strava:null };
          }
          break;
        default:
          session = { type:'Rest / Recovery', icon:'🛌', mins:0, intensity:'easy',
            detail:'Full rest', strava:null };
      }
    }

    if (session) result.push({ day: dayName, date: new Date(date), ...session });
  });
  return result;
}

// ── Workout visual card builder ───────────────────────────────────────────────
// Draws a mini interval visualisation bar chart inside the workout card
// Zone → ceiling height (0–1) — each zone fills to its UPPER boundary
// This means all Z2 blocks are the same height; shade shows position within zone
const ZONE_POWER = { Z1:0.20, Z2:0.40, Z3:0.58, Z4:0.76, Z5:0.92, Z6:1.0, rest:0.04 };

// Zone colours — used for prescribed sessions
const ZONE_COLOUR_FILL = {
  Z1:'rgba(107,107,128,0.85)', Z2:'rgba(74,158,255,0.9)',   Z3:'rgba(96,200,240,0.9)',
  Z4:'rgba(240,160,96,0.9)',   Z5:'rgba(240,96,96,0.95)',   Z6:'rgba(240,96,160,0.95)',
  rest:'rgba(30,30,40,0.4)'
};

// Parse any colour (hex #rrggbb or rgba(...)) → [r,g,b,a]
function parseAnyColour(s) {
  if (!s) return [128,128,128,0.85];
  s = String(s).trim();
  // Hex #rrggbb or #rgb
  if (s.startsWith('#')) {
    let hex = s.slice(1);
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
    return [isNaN(r)?128:r, isNaN(g)?128:g, isNaN(b)?128:b, 0.85];
  }
  // rgba(...) or rgb(...)
  const m = s.match(/[\d.]+/g);
  if (!m || m.length < 3) return [128,128,128,0.85];
  return [
    Math.max(0,Math.min(255,Math.round(parseFloat(m[0])))),
    Math.max(0,Math.min(255,Math.round(parseFloat(m[1])))),
    Math.max(0,Math.min(255,Math.round(parseFloat(m[2])))),
    m[3]!==undefined ? Math.max(0,Math.min(1,parseFloat(m[3])||0.85)) : 0.85
  ];
}

// Build a STEPPED (square-wave) power profile from zone blocks
// Returns array of segments: [{x0,x1,power,zone,colour}, ...]
// Each segment is a rectangular block — no curves, no interpolation
function buildSteppedProfile(session, totalWidth) {
  if (!session || session.mins === 0 || !session.type) return null;
  if (session.type.startsWith('Rest') || session.type === 'Rest & Prep' || session.type === 'Rest & Celebrate') return null;

  const W = totalWidth || 280;

  // ── Gym sessions: alternating effort/rest blocks ──────────────────────────
  if (session.isGym || session.icon === '🏋️' || session.icon === '🧘') {
    const sets = 5, restRatio = 0.4;
    const blockW = W / sets;
    const segs = [];
    for (let s = 0; s < sets; s++) {
      const x0 = s * blockW;
      const restW = blockW * restRatio;
      const workW = blockW * (1 - restRatio);
      // rest
      segs.push({ x0, x1: x0 + restW, power: 0.08, zone:'Z1', colour:'rgba(107,107,128,0.5)' });
      // effort
      segs.push({ x0: x0 + restW, x1: x0 + restW + workW, power: 0.55, zone:'strength', colour:'rgba(240,160,240,0.85)' });
    }
    return segs;
  }

  // ── Race day: stepped build through 6 phases ─────────────────────────────
  if (session.type && (session.type.includes('BAVIAANS') || session.type.includes('Race Day'))) {
    const phases = [
      { frac:0.08, power:0.25, colour:'rgba(74,158,255,0.8)'   },  // neutral rollout
      { frac:0.30, power:0.38, colour:'rgba(96,200,240,0.85)'  },  // settle Z2-3
      { frac:0.25, power:0.42, colour:'rgba(96,200,240,0.85)'  },  // mid-race
      { frac:0.20, power:0.50, colour:'rgba(240,160,96,0.85)'  },  // build
      { frac:0.12, power:0.62, colour:'rgba(240,160,96,0.9)'   },  // push
      { frac:0.05, power:0.80, colour:'rgba(240,96,96,0.9)'    },  // finish
    ];
    const segs = []; let x = 0;
    phases.forEach(p => {
      const w = W * p.frac;
      segs.push({ x0:x, x1:x+w, power:p.power, zone:'Z3', colour:p.colour });
      x += w;
    });
    return segs;
  }

  // ── Structured ride: use zones array as rectangular blocks ───────────────
  if (session.zones && session.zones.length) {
    const numBlocks = session.zones.length;
    const blockW = W / numBlocks;
    const segs = [];
    session.zones.forEach((z, i) => {
      const pwr    = ZONE_POWER[z] || 0.32;
      const colour = session.colors ? (session.colors[i] || ZONE_COLOUR_FILL[z]) : ZONE_COLOUR_FILL[z];
      segs.push({ x0: i * blockW, x1: (i+1) * blockW, power: pwr, zone: z, colour });
    });
    return segs;
  }

  // ── Unstructured endurance ride: two blocks (warmup + steady) ────────────
  const isRecovery = session.type && session.type.toLowerCase().includes('recovery');
  const pwr = isRecovery ? 0.12 : 0.32;
  const colour = isRecovery ? ZONE_COLOUR_FILL.Z1 : ZONE_COLOUR_FILL.Z2;
  return [
    { x0:0,       x1:W*0.08, power:pwr*0.5,  zone:'Z1', colour:ZONE_COLOUR_FILL.Z1 },
    { x0:W*0.08,  x1:W*0.93, power:pwr,       zone: isRecovery?'Z1':'Z2', colour },
    { x0:W*0.93,  x1:W,      power:pwr*0.4,  zone:'Z1', colour:ZONE_COLOUR_FILL.Z1 },
  ];
}

// Draw HARD-EDGED power profile — rectangular zone blocks with intra-zone shading
// Each block is the zone's colour; within the block a subtle vertical gradient
// suggests power variability (lighter top = higher power within zone, darker = lower).
// Hard 1px separators between zone changes. Zone labels on tall blocks in card mode.
// mode: 'card' (tall) | 'cell' (small grid cell)
function drawPowerProfile(session, canvas, mode) {
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const segs = buildSteppedProfile(session, W);

  if (!segs || !segs.length) {
    ctx.fillStyle = 'rgba(107,107,128,0.15)';
    ctx.fillRect(0, H - 2, W, 2);
    return;
  }

  const PAD_TOP = mode === 'card' ? 6  : 3;
  const PAD_BOT = mode === 'card' ? 4  : 2;
  const drawH   = H - PAD_TOP - PAD_BOT;

  segs.forEach(seg => {
    const x0   = Math.floor(seg.x0);
    const x1   = Math.ceil(seg.x1);
    const segW = Math.max(1, x1 - x0);
    // ALL blocks draw at the zone ceiling — same zone = same height
    const barH = Math.round(drawH * seg.power);
    const y    = PAD_TOP + (drawH - barH);

    // Use parseAnyColour which handles both hex and rgba formats
    const [r,g,b,a] = parseAnyColour(seg.colour);

    if (barH > 0) {
      const hiA  = mode === 'cell' ? 0.80 : 0.70;
      const loA  = mode === 'cell' ? 0.35 : 0.25;
      const grad = ctx.createLinearGradient(0, y, 0, y + barH);
      grad.addColorStop(0,   `rgba(${Math.min(255,r+15)},${Math.min(255,g+15)},${Math.min(255,b+15)},${hiA})`);
      grad.addColorStop(0.5, `rgba(${r},${g},${b},${(hiA+loA)/2})`);
      grad.addColorStop(1,   `rgba(${Math.max(0,r-10)},${Math.max(0,g-10)},${Math.max(0,b-10)},${loA})`);
      ctx.fillStyle = grad;
      ctx.fillRect(x0, y, segW, barH);
    }

    // Top edge — full-opacity zone colour line
    const topCol = `rgba(${r},${g},${b},${Math.min(1,a+0.1)})`;
    ctx.fillStyle = topCol;
    ctx.fillRect(x0, y, segW, mode === 'card' ? 2 : 1);

    // Zone label on tall blocks in card mode
    if (mode === 'card' && seg.zone &&
        seg.zone !== 'Z1' && seg.zone !== 'Z2' && seg.zone !== 'strength' && barH > 14) {
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = '500 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(seg.zone, x0 + segW / 2, y + 9);
    }
  });

  // Hard 1px separator lines between zone changes only
  if (mode === 'card') {
    ctx.fillStyle = 'rgba(10,10,15,0.8)';
    segs.forEach((seg, i) => {
      if (i > 0 && segs[i-1].zone !== seg.zone) {
        ctx.fillRect(Math.floor(seg.x0), PAD_TOP, 1, drawH);
      }
    });
  }
}
function buildWorkoutCard(session, isToday) {
  const intBg  = {easy:'rgba(96,208,144,0.10)',moderate:'rgba(96,200,240,0.10)',hard:'rgba(240,160,96,0.10)',race:'rgba(240,208,96,0.18)'};
  const intBdr = {easy:'rgba(96,208,144,0.30)',moderate:'rgba(96,200,240,0.30)',hard:'rgba(240,160,96,0.30)',race:'rgba(240,208,96,0.55)'};
  const gymBg  = 'rgba(240,160,240,0.10)';
  const gymBdr = 'rgba(240,160,240,0.30)';
  const holBg  = 'rgba(240,208,96,0.08)';
  const holBdr = 'rgba(240,208,96,0.30)';

  const bg  = session.isHoliday ? holBg  : session.isGym ? gymBg  : isToday ? intBg[session.intensity||'easy']  : 'var(--bg3)';
  const bdr = session.isHoliday ? holBdr : session.isGym ? gymBdr : isToday ? intBdr[session.intensity||'easy'] : 'var(--border)';

  const card = document.createElement('div');
  card.style.cssText = 'display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;' +
    'background:'+bg+';border:.5px solid '+bdr+';border-radius:10px;padding:.8rem 1.2rem;';

  // Day + date
  const dayCol = document.createElement('div');
  dayCol.style.cssText = 'min-width:40px;';
  const dayLbl = document.createElement('div');
  dayLbl.style.cssText = 'font-family:var(--mono);font-size:11px;font-weight:'+(isToday?'500':'400')+';color:'+(isToday?'var(--text)':'var(--muted)')+';';
  dayLbl.textContent = session.day;
  const dateLbl = document.createElement('div');
  dateLbl.style.cssText = 'font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;';
  dateLbl.textContent = session.date.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  dayCol.appendChild(dayLbl); dayCol.appendChild(dateLbl);
  card.appendChild(dayCol);

  // Icon
  const iconEl = document.createElement('div');
  iconEl.style.cssText = 'font-size:18px;min-width:24px;padding-top:2px;';
  iconEl.textContent = session.icon;
  card.appendChild(iconEl);

  // Main info
  const info = document.createElement('div');
  info.style.cssText = 'flex:1;min-width:160px;';

  // Type row with badges
  const typeRow = document.createElement('div');
  typeRow.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap;';
  const typeLbl = document.createElement('span');
  typeLbl.style.cssText = 'font-size:13px;font-weight:'+(isToday?'500':'400')+';color:'+(isToday?'var(--text)':'var(--muted)')+';';
  typeLbl.textContent = session.type;
  typeRow.appendChild(typeLbl);

  // Right side: TODAY badge + Push to Zwift + Add to Calendar

  actions.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;';

    const s = session;
    btn.addEventListener('click', function() { pushToZwift(btn, s); });
    actions.appendChild(btn);
  }

  if (session.strava) {
    const calBtn = document.createElement('button');
    calBtn.className = 'btn-cal';
    calBtn.textContent = '📅 Calendar';
    const s = session;
    calBtn.addEventListener('click', function(){ addToCalendar(calBtn, s.strava, s.desc||s.detail, s.date, s.mins||60); });
    actions.appendChild(calBtn);
  }

  card.appendChild(actions);
  return card;
}

// ── Push to Zwift — generates a .zwo custom workout file ─────────────────────
// Zwift Custom Workout format (.zwo) is XML. Each segment is a SteadyState,
// Warmup, Cooldown, or IntervalsT block with power as % of FTP (0.0–1.5).
// User downloads the file and places it in:
//   Windows: Documents\Zwift\Workouts\<athlete_id>\
//   Mac:     ~/Documents/Zwift/Workouts/<athlete_id>/
//   iOS/Android: import via Files app → Zwift folder

// Zone → FTP fraction mapping (mid-point of each zone, scientifically grounded)
const ZONE_FTP = {
  Z1: 0.55,  // Active recovery: 55% FTP
  Z2: 0.68,  // Aerobic endurance: 65–75% → 68% mid
  Z3: 0.83,  // Tempo: 80–87% → 83% mid
  Z4: 0.97,  // Threshold: 91–105% → 97% mid
  Z5: 1.13,  // VO2max: 106–120% → 113% mid
  Z6: 1.30,  // Anaerobic: 121%+ → 130%
  rest: 0.40 // Easy spin / recovery
};

function generateZwoXml(session, ftpWatts) {
  const ftp = ftpWatts || 200;
  const zones = session.zones || ['Z1','Z2','Z1'];
  const totalSecs = (session.mins || 60) * 60;

  // Distribute time evenly across zone segments
  const segSecs = Math.round(totalSecs / zones.length);

  // Build workout name and description
  const name = session.strava || session.type || 'Training Intelligence Workout';
  const desc = (session.detail || '') + '\n\nGenerated by Training Intelligence · Trans Baviaans 2026 preparation\neFTP used: ' + ftp + 'W';

  // Convert zones array into ZWO segments
  // Group consecutive same-zone segments for cleaner structure
  const grouped = [];
  zones.forEach(function(z, i) {
    if (grouped.length && grouped[grouped.length-1].zone === z) {
      grouped[grouped.length-1].count++;
    } else {
      grouped.push({ zone: z, count: 1 });
    }
  });

  let xmlSegs = '';
  let segIdx = 0;

  grouped.forEach(function(g, gi) {
    const dur = segSecs * g.count;
    const pwr = ZONE_FTP[g.zone] || 0.65;
    const pwrStr = pwr.toFixed(2);

    // First segment = Warmup, last = Cooldown, middle = SteadyState or IntervalsT
    if (gi === 0) {
      xmlSegs += `    <Warmup Duration="${dur}" PowerLow="${(pwr * 0.6).toFixed(2)}" PowerHigh="${pwrStr}" />\n`;
    } else if (gi === grouped.length - 1) {
      xmlSegs += `    <Cooldown Duration="${dur}" PowerLow="${pwrStr}" PowerHigh="${(pwr * 0.6).toFixed(2)}" />\n`;
    } else {
      // Check if this is an interval zone (Z4+) surrounded by recovery zones — use IntervalsT
      const isHard = ['Z4','Z5','Z6'].includes(g.zone);
      const prevZone = grouped[gi-1]?.zone;
      const nextZone = grouped[gi+1]?.zone;
      const hasRecovery = prevZone && !['Z4','Z5','Z6'].includes(prevZone);

      if (isHard && hasRecovery && g.count === 1) {
        // Single hard segment — SteadyState
        xmlSegs += `    <SteadyState Duration="${dur}" Power="${pwrStr}" />\n`;
      } else if (isHard && g.count === 1) {
        xmlSegs += `    <SteadyState Duration="${dur}" Power="${pwrStr}" />\n`;
      } else {
        xmlSegs += `    <SteadyState Duration="${dur}" Power="${pwrStr}" />\n`;
      }
    }
    segIdx++;
  });

  return `<?xml version="1.0" encoding="utf-8"?>
<workout_file>
  <author>Training Intelligence</author>
  <name>${xmlEscape(name)}</name>
  <description>${xmlEscape(desc)}</description>
  <sportType>bike</sportType>
  <tags>
    <tag name="TrainingIntelligence"/>
    <tag name="TransBaviaans2026"/>
  </tags>
  <workout>
${xmlSegs}  </workout>
</workout_file>`;
}

function xmlEscape(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

window.pushToZwift = function(btn, session) {
  const ftpWatts = window._lastFtp || 200;
  const xml = generateZwoXml(session, ftpWatts);

  // Create downloadable .zwo file
  const blob = new Blob([xml], { type: 'application/xml' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');

  // Safe filename
  const fname = (session.strava || session.type || 'workout')
    .replace(/[^a-z0-9\-_ ]/gi, '').replace(/\s+/g, '_').slice(0, 50) + '.zwo';

  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Button feedback + instructions
  btn.textContent = '✓ Downloaded';
  btn.style.color = '#60d090'; btn.style.borderColor = 'rgba(96,208,144,0.5)';

  // Show install instructions toast
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#16161e;border:.5px solid rgba(96,208,144,0.4);border-radius:14px;padding:14px 18px;font-family:var(--mono);font-size:11px;color:var(--text);z-index:9999;max-width:420px;width:90vw;line-height:1.8;box-shadow:0 8px 32px rgba(0,0,0,0.6);';
  toast.innerHTML =
    '<div style="font-size:12px;font-weight:500;color:#60d090;margin-bottom:6px;">✓ ' + fname + ' downloaded</div>' +
    '<div style="color:var(--muted);">To use in Zwift:</div>' +
    '<div style="color:var(--muted);">• <span style="color:var(--text);">Windows:</span> Move to <code style="color:var(--accent2);">Documents\\Zwift\\Workouts\\</code></div>' +
    '<div style="color:var(--muted);">• <span style="color:var(--text);">Mac:</span> Move to <code style="color:var(--accent2);">~/Documents/Zwift/Workouts/</code></div>' +
    '<div style="color:var(--muted);">• <span style="color:var(--text);">iOS/Android:</span> Import via Files → Zwift folder</div>' +
    '<div style="margin-top:6px;color:var(--muted);">Then open Zwift → Training → Custom Workouts → find <span style="color:var(--accent2);">' + (session.type||'your workout') + '</span></div>';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 8000);

  setTimeout(() => {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" fill="#00BC45"/><path d="M4 7l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Zwift';
    btn.style.color = 'var(--text)'; btn.style.borderColor = 'rgba(255,255,255,0.2)';
  }, 5000);

// ── Add to Google Calendar (via gcal.mcp.claude.com) ─────────────────────────
// Since we can't call MCP from client-side HTML, we generate a Google Calendar
// URL that opens the event pre-filled in the user's browser
window.addToCalendar = function(btn, title, description, date, durationMins) {
  btn.disabled = true;
  try {
    const d = date || new Date();
    const startDate = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 6, 0, 0);
    const endDate   = new Date(startDate.getTime() + durationMins * 60 * 1000);
    // Format: YYYYMMDDTHHmmss (local time, no Z = floating)
    function gcalFmt(dt) {
      return dt.getFullYear().toString() +
        String(dt.getMonth()+1).padStart(2,'0') +
        String(dt.getDate()).padStart(2,'0') + 'T' +
        String(dt.getHours()).padStart(2,'0') +
        String(dt.getMinutes()).padStart(2,'0') + '00';
    }
    const url = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
      '&text=' + encodeURIComponent(title) +
      '&dates=' + gcalFmt(startDate) + '/' + gcalFmt(endDate) +
      '&details=' + encodeURIComponent(description + '\n\n#TransBaviaans2026 #Sub11Hr #TrainingIntelligence') +
      '&ctz=Africa/Johannesburg';
    window.open(url, '_blank');
    btn.textContent = '✓ Opening...';
    btn.style.color = '#60d090'; btn.style.borderColor = 'rgba(96,208,144,0.5)';
    setTimeout(() => { btn.textContent = '📅 Calendar'; btn.style.color='var(--accent2)'; btn.style.borderColor='rgba(96,200,240,0.35)'; btn.disabled=false; }, 2000);
  } catch(e) { btn.textContent='✗ Error'; btn.disabled=false; }
};

// Builds a full grid: weeks = rows, days = cells
// Each cell shows: workout bar (height = intensity), zone colour, icon, duration
// Past cells show: done ✓ or missed ✗ based on Strava activities
// Tooltip on hover shows full session notes

const PLAN_START_DATE = PLAN_MONDAY; // starts from current week's Monday

// Map phase name → phase colour config
const PHASE_COLOUR = {
  'Base 1':    { bg:'rgba(74,158,255,0.10)',  border:'rgba(74,158,255,0.4)',  bar:'#4a9eff',  text:'#4a9eff'  },
  'Base 2':    { bg:'rgba(96,200,240,0.10)',  border:'rgba(96,200,240,0.4)',  bar:'#60c8f0',  text:'#60c8f0'  },
  'Build 1':   { bg:'rgba(200,240,96,0.10)',  border:'rgba(200,240,96,0.4)',  bar:'#c8f060',  text:'#c8f060'  },
  'Build 2':   { bg:'rgba(240,160,96,0.10)',  border:'rgba(240,160,96,0.4)',  bar:'#f0a060',  text:'#f0a060'  },
  'Peak':      { bg:'rgba(240,96,160,0.10)',  border:'rgba(240,96,160,0.4)',  bar:'#f060a0',  text:'#f060a0'  },
  'Taper':     { bg:'rgba(96,208,144,0.10)',  border:'rgba(96,208,144,0.4)',  bar:'#60d090',  text:'#60d090'  },
  'Race Week': { bg:'rgba(240,208,96,0.15)',  border:'rgba(240,208,96,0.6)',  bar:'#f0d060',  text:'#f0d060'  },
};

// Zone colour for bar fill
const ZONE_BAR_COLOUR = {
  'Z1':'#6b6b80', 'Z2':'#4a9eff', 'Z3':'#60c8f0',
  'Z4':'#f0a060', 'Z5':'#f06060', 'Z6':'#f060a0',
  'rest':'#1e1e28', 'strength':'rgba(240,160,240,0.9)', 'race':'#f0d060',
};

// Intensity → bar height fraction (0–1)
function intensityBarHeight(session) {
  if (!session || session.type === 'Rest / Recovery' || session.mins === 0) return 0;
  if (session.isGym || session.icon === '🏋️' || session.icon === '🧘') return 0.45;
  if (session.type && session.type.includes('Race')) return 1.0;
  const mins = session.mins || 0;
  // Scale: 0→0, 90→0.4, 180→0.6, 300→0.8, 420→1.0
  const timeFraction = Math.min(mins / 420, 1.0);
  // Intensity boost for interval/threshold sessions
  let intensityBoost = 1.0;
  if (session.isInterval) intensityBoost = 1.25;
  if (session.zones && session.zones.some(z => z === 'Z5' || z === 'Z6')) intensityBoost = 1.4;
  if (session.zones && session.zones.some(z => z === 'Z4')) intensityBoost = 1.2;
  return Math.min(timeFraction * intensityBoost, 1.0);
}

// Bar colour for a session
function sessionBarColour(session, phaseBar) {
  if (!session || session.mins === 0) return 'transparent';
  if (session.type && session.type.includes('BAVIAANS')) return ZONE_BAR_COLOUR.race;
  if (session.isGym || session.icon === '🏋️') return ZONE_BAR_COLOUR.strength;
  // Interval sessions: use the highest zone's colour
  if (session.zones && session.zones.length) {
    const highest = session.zones.reduce((best, z) => {
      const rank = {'Z1':1,'Z2':2,'Z3':3,'Z4':4,'Z5':5,'Z6':6};
      return (rank[z]||0) > (rank[best]||0) ? z : best;
    }, 'Z1');
    return ZONE_BAR_COLOUR[highest] || phaseBar;
  }
  return phaseBar;
}

function buildTrainingPlanVisual(activities) {

    '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +
    Object.entries({Ride:'#4a9eff',Intervals:'#f0a060',Strength:'rgba(240,160,240,0.9)',Rest:'#2a2a3a',Race:'#f0d060'})

  document.body.appendChild(tooltip);

  // Build each week row
  phaseWeekMap.forEach((phaseName, weekIdx) => {
    const weekStart = new Date(PLAN_START_DATE);
    weekStart.setDate(weekStart.getDate() + weekIdx * 7);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    const weekKey = localDateKey(weekStart);
    const pc = PHASE_COLOUR[phaseName] || PHASE_COLOUR['Base 1'];
    const plan = PHASE_PLANS[phaseName] || PHASE_PLANS['Base 1'];

    // Is this week in the past, current, or future?
    const isCurrentWeek = today >= weekStart && today <= weekEnd;
    const isPastWeek = weekEnd < today;

    // Week row
    const weekRow = document.createElement('div');

    weekRow.appendChild(weekLabel);

    let weekPlanSessions = [];
