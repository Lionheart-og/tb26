// ── Zone Configuration ────────────────────────────────────────────────────────
// Defaults: Coggan 6-zone model (power as FTP fractions, HR as max HR fractions)
// Overridden by Strava athlete zones when available.
//
// Power zones: upper boundary as fraction of FTP
// Z1 < 0.56, Z2 < 0.76, Z3 < 0.90, Z4 < 1.05, Z5 < 1.20, Z6 = above
//
// HR zones: upper boundary as fraction of max HR (if no Strava HR zones)
// Z1 < 0.68, Z2 < 0.83, Z3 < 0.94, Z4 < 1.02, Z5 = above

window._zoneConfig = {
  power: [
    { label:'Z1', maxFrac: 0.56, col:'#6b7db5' },
    { label:'Z2', maxFrac: 0.76, col:'#4a9eff' },
    { label:'Z3', maxFrac: 0.90, col:'#60c8f0' },
    { label:'Z4', maxFrac: 1.05, col:'#f0a060' },
    { label:'Z5', maxFrac: 1.20, col:'#f06060' },
    { label:'Z6', maxFrac: 99,   col:'#f030a0' },
  ],
  hr: [
    { label:'Z1', maxFrac: 0.68, col:'#6b7db5' },
    { label:'Z2', maxFrac: 0.83, col:'#4a9eff' },
    { label:'Z3', maxFrac: 0.94, col:'#60c8f0' },
    { label:'Z4', maxFrac: 1.02, col:'#f0a060' },
    { label:'Z5', maxFrac: 99,   col:'#f06060' },
  ],
  // Ceiling heights for prescribed plan display — fixed visual constants, not zone boundaries
  // These map zone labels to chart fill heights (fraction of drawH)
  powerCeil: { Z1:0.20, Z2:0.40, Z3:0.58, Z4:0.76, Z5:0.92, Z6:1.0 },
};

// Parse Strava /athlete/zones response and update _zoneConfig
// Strava returns: { heart_rate: { zones: [{min,max},...] }, power: { zones: [{min,max},...] } }
function applyStravaZones(data) {
  // Power zones — Strava gives absolute watt values; convert to FTP fractions
  // We need FTP to do this, use _lastFtp if available
  if (data.power && Array.isArray(data.power.zones) && data.power.zones.length >= 5) {
    const ftp = window._lastFtp || 0;
    if (ftp > 100) {
      const pz = data.power.zones;
      window._zoneConfig.power = pz.map(function(z, i) {
        const col = ['#6b7db5','#4a9eff','#60c8f0','#f0a060','#f06060','#f030a0'][i] || '#f030a0';
        const lbl = 'Z' + (i+1);
        // max=-1 means "unlimited" (last zone)
        const maxFrac = (z.max === -1 || z.max === null) ? 99 : z.max / ftp;
        return { label:lbl, maxFrac, col, stravaMin:z.min, stravaMax:z.max };
      });
      // Update zone FTP fractions but keep powerCeil fixed — it's a visual constant
      // that maps zone names to chart heights, not zone watt boundaries
      window._zoneConfig.power.forEach(function(z, i) {
        // powerCeil stays as-is — Z1=0.20, Z2=0.40 etc are visual display heights
      });
      console.log('✓ Power zones from Strava:', window._zoneConfig.power.map(z=>z.label+' <'+Math.round(z.maxFrac*ftp)+'W').join(', '));
    }
  }

  // HR zones — Strava gives absolute BPM values
  if (data.heart_rate && Array.isArray(data.heart_rate.zones) && data.heart_rate.zones.length >= 4) {
    const hz = data.heart_rate.zones;
    // Find max HR from last zone's max (or 220-age default)
    const maxHrBound = hz.reduce(function(m,z){ return (z.max>0&&z.max<300)?Math.max(m,z.max):m; }, 0) || 185;
    window._zoneConfig.hr = hz.map(function(z,i) {
      const col = ['#6b7db5','#4a9eff','#60c8f0','#f0a060','#f06060'][i] || '#f030a0';
      return { label:'Z'+(i+1), maxFrac: (z.max===-1||z.max===null)?99:z.max/maxHrBound, col,
               stravaMin:z.min, stravaMax:z.max, maxHrBound };
    });
    // Update HR_THRESHOLD used in TSS calculation
    const lthrZone = window._zoneConfig.hr[3]; // Z4 lower = LTHR
    if (lthrZone && lthrZone.stravaMin > 100) {
      window._HR_THRESHOLD = lthrZone.stravaMin;
    }
    console.log('✓ HR zones loaded from Strava:', window._zoneConfig.hr.map(z=>z.label+' <'+Math.round(z.maxFrac*maxHrBound)+'bpm').join(', '));
  }
}

// Zone lookup helpers — used everywhere in the dashboard
// Returns zone label, colour, and ceiling fraction for a given power/HR value
function getPowerZone(watts, ftp) {
  const r = watts / (ftp || window._lastFtp || 200);
  return window._zoneConfig.power.find(z => r < z.maxFrac) || window._zoneConfig.power[window._zoneConfig.power.length-1];
}
function getHRZone(hr, maxHR) {
  const r = hr / (maxHR || 185);
  return window._zoneConfig.hr.find(z => r < z.maxFrac) || window._zoneConfig.hr[window._zoneConfig.hr.length-1];
}
function getPowerZoneColour(watts, ftp) { return getPowerZone(watts, ftp).col; }

async function loadAndRender(token) {
  document.getElementById('status-text').textContent = 'Loading activities...';
  const H     = { Authorization: 'Bearer ' + token };
  const after = Math.floor((Date.now() - 180*86400000) / 1000); // 180 days for CTL convergence
  const base  = 'https://www.strava.com/api/v3/athlete/activities?per_page=100&after=' + after;

  const [athRes, actRes1, zonesRes] = await Promise.all([
    fetch('https://www.strava.com/api/v3/athlete', { headers: H }),
    fetch(base + '&page=1', { headers: H }),
    fetch('https://www.strava.com/api/v3/athlete/zones', { headers: H }),
  ]);

  if (athRes.status === 401 || actRes1.status === 401) {
    localStorage.removeItem(TOKEN_SK);
    localStorage.removeItem(EXPIRY_SK);
    showTokenUI('Your Strava token has expired. Tap below to re-connect — takes 10 seconds.');
    return;
  }

  const athlete = await athRes.json();
  const page1   = await actRes1.json();

  // Parse Strava zones — non-fatal if unavailable
  try {
    const zonesData = await zonesRes.json();
    if (zonesData && (zonesData.power || zonesData.heart_rate)) {
      window._stravaZones = zonesData;
      applyStravaZones(zonesData);
    }
  } catch(e) { /* zones optional */ }

  if (!Array.isArray(page1)) {
    throw new Error(page1?.message || JSON.stringify(page1));
  }

  // Fetch pages until we have all 180 days (up to 3 pages of 100)
  let activities = page1;
  for (let p = 2; p <= 3; p++) {
    if (activities.length < p * 100 - 100) break; // previous page wasn't full
    try {
      const res  = await fetch(base + '&page=' + p, { headers: H });
      const page = await res.json();
      if (Array.isArray(page) && page.length > 0) activities = activities.concat(page);
      else break;
    } catch(e) { break; }
  }
  // Clean up OAuth code from URL without reloading
  if (location.search.includes('code=')) {
    history.replaceState({}, '', location.pathname);
  }
  showAthlete(athlete);
  document.getElementById('loading').style.display = 'none';
  const lastDate = activities.length
    ? new Date([...activities].sort((a,b) => new Date(b.start_date) - new Date(a.start_date))[0].start_date)
        .toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
    : '—';
  document.getElementById('status-text').textContent =
    activities.length + ' activities · Strava power data · last activity ' + lastDate;

  // ── Debug: log all activity type/sport_type combos to console ────────────
  console.group('Strava activity type audit — last 90 days (' + activities.length + ' total)');
  const cutoff90dbg = Date.now() - 90*86400000;
  const typeMap = {};
  activities.forEach(a => {
    const key = 'type:' + a.type + ' | sport_type:' + (a.sport_type||'—') + ' | trainer:' + a.trainer;
    typeMap[key] = (typeMap[key]||0) + 1;
  });
  Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>console.log(v+'x  '+k));
  // Specifically find the ~19 March ride
  const march = activities.filter(a => a.start_date && a.start_date.startsWith('2026-03'));
  console.log('March 2026 activities:');
  march.forEach(a => console.log(' ', a.start_date.slice(0,10), '|', a.name, '| type:', a.type, '| sport_type:', a.sport_type, '| trainer:', a.trainer));
  console.groupEnd();

  // Pre-compute eFTP so power-based TSS in load() uses the real FTP value
  const preFtp = estimateFTP(activities, 50);
  window._lastFtp = preFtp.watts || 200;
  console.log('eFTP estimate:', preFtp.watts + 'W',
    '| method:', preFtp.method,
    '| best ride:', preFtp.bestRide||'—',
    '| date:', preFtp.bestDate||'—',
    '| NP used:', preFtp.p20||'—');

  // Debug: log TSS per activity to find inflation
  console.group('TSS audit (FTP=' + window._lastFtp + 'W)');
  const cutDbg = Date.now() - 30*86400000; // last 30 days
  activities.filter(a => new Date(a.start_date).getTime() > cutDbg)
    .sort((a,b) => new Date(b.start_date)-new Date(a.start_date))
    .forEach(a => {
      const tss = load(a);
      console.log(
        a.start_date.slice(0,10),
        '|', (a.sport_type||a.type).padEnd(20),
        '| TSS:', String(tss).padStart(4),
        '| avg_w:', (a.average_watts||0),
        '| w_avg_w:', (a.weighted_average_watts||0),
        '| suffer:', (a.suffer_score||0),
        '| hr:', (a.average_heartrate||0),
        '| t:', Math.round((a.moving_time||0)/60)+'min',
        '|', a.name
      );
    });
  console.groupEnd();

  render(athlete, activities, computeMetrics(activities));
}

async function init() {
  // file:// guard
  if (location.protocol === 'file:') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('status-text').textContent = 'Needs HTTPS hosting';
    const app = document.getElementById('app');
    const b = document.createElement('div');
    b.style.cssText = 'background:#18181f;border:.5px solid rgba(240,160,96,0.4);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;';
    b.innerHTML = '<div style="font-size:15px;font-weight:500;color:#f0a060;margin-bottom:8px;">📡 Needs HTTPS hosting</div>' +
      '<div style="font-size:13px;color:#9090a8;line-height:1.8;">Open this file via <strong style="color:#f0f0f8">Netlify Drop</strong> (drag onto <a href="https://app.netlify.com/drop" target="_blank" style="color:#60c8f0;">app.netlify.com/drop</a>) to get a free instant HTTPS URL, then open that URL on any device.</div>';
    app.insertBefore(b, app.children[2]);
    return;
  }

  try {
    document.getElementById('status-text').textContent = 'Connecting to Strava...';

    // Check for OAuth redirect code in URL (?code=...)
    const params = new URLSearchParams(location.search);
    const code   = params.get('code');
    if (code) {
      document.getElementById('status-text').textContent = 'Completing Strava authorisation...';
      const token = await exchangeCodeForToken(code);
      if (token) {
        await loadAndRender(token);
        return;
      }
      // Proxy failed — show manual paste with the code visible for debugging
      showTokenUI('Authorisation code received but proxy exchange failed. Please paste a token manually.');
      return;
    }

    // Normal load — try cached token first, then auto-refresh via Worker
    const token = await getToken();
    if (!token) {
      showTokenUI();
      return;
    }
    await loadAndRender(token);

  } catch(e) {
    if (e.message && (e.message.includes('401') || e.message.includes('Authorization'))) {
      showTokenUI('Your Strava token has expired. Tap below to re-connect.');
      return;
    }
    if (e.message && e.message.includes('WORKER_NOT_CONFIGURED')) {
      showTokenUI();
      return;
    }
    showErrorBanner(e.message || String(e));
  }
}

    }
    if (def.target) {
      html += `<div class="tip-body" style="margin-top:7px;color:rgba(200,240,96,0.7);">🎯 ${def.target}</div>`;
    }
    if (def.zones) {
      html += '<div class="tip-zones">';
      def.zones.forEach(function(z) {
        html += `<div class="tip-zone"><div class="tip-dot" style="background:${z.col}"></div><span style="color:${z.col};min-width:110px;">${z.label}</span><span style="color:var(--muted);">${z.desc}</span></div>`;
      });
      html += '</div>';
    }
    if (def.wkgScale) {
      html += '<div class="tip-zones" style="margin-top:8px;">';
      def.wkgScale.forEach(function(w) {
        html += `<div class="tip-zone"><div class="tip-dot" style="background:${w.col}"></div><span style="color:${w.col};min-width:65px;">${w.range}</span><span style="color:var(--muted);">${w.label}</span></div>`;
      });
      html += '</div>';
    }

    tip.innerHTML = html;
    tip.style.display = 'block';
    positionMetricTip(e);
  }

  function positionMetricTip(e) {
    const margin = 12;
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    const vw = window.innerWidth, vh = window.innerHeight;
    let x = e.clientX + margin;
    let y = e.clientY + margin;
    if (x + tw > vw - margin) x = e.clientX - tw - margin;
    if (y + th > vh - margin) y = e.clientY - th - margin;
    if (y < margin) y = margin;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }

  function hideTip() { tip.style.display = 'none'; }

  // Wire up cards — use MutationObserver so it works after dashboard renders
  function attachTips() {
    const cards = document.querySelectorAll('.metrics-grid .metric-card');
    const keys = ['fitness','fatigue','form','eftp','wkg'];
    cards.forEach(function(card, i) {
      if (card._tipAttached) return;
      const key = keys[i];
      if (!key) return;
      card.style.cursor = 'help';
      card._tipAttached = true;
      card.addEventListener('mouseenter', function(e) { showTip(e, key); });
      card.addEventListener('mousemove',  function(e) { positionMetricTip(e); });
      card.addEventListener('mouseleave', hideTip);
    });
  }

  // Attach immediately + watch for dashboard render
  attachTips();
  const obs = new MutationObserver(attachTips);
  obs.observe(document.body, { childList: true, subtree: true });
})();

// ── Goal readiness hover tooltips ─────────────────────────────────────────────
(function() {

      detail: 'The power-duration relationship is the foundational law of endurance sport (Monod & Scherrer, 1965; validated by Allen & Coggan). Your maximum sustainable power decreases predictably as duration increases. The exponent 0.07 is scientifically calibrated for trained cyclists across the 20-minute to 8-hour range. An 11-hour race sits at the extreme end — roughly 17% below your FTP. This is physiological reality, not a conservative estimate. The target W/kg is calculated from a cycling physics model: aero drag + climbing power (mass × gravity × gradient × velocity) + rolling resistance, divided by 0.65 (the ultra-endurance FTP fraction) and your body weight.',
      weight: 'Contributes 40% to the overall readiness score — the highest weight because it is the most direct and objective measure of whether you currently have the engine to meet your time goal at this moment.',
    },
    ctl: {
      title: '📈 Fitness (CTL) — 30% of score',
      col: '#c8f060',
      body: 'Chronic Training Load (CTL) is your 42-day exponentially weighted training average. It represents the depth of your aerobic base — how much sustained work your body has adapted to handle over the last 6 weeks.',
      formula: 'CTL = CTL_prev + (Daily Load − CTL_prev) ÷ 42  |  Target for sub-11hr Baviaans: CTL ≥ 85',
      detail: 'A CTL of 85 is the minimum threshold for arriving at Baviaans with enough aerobic capacity to sustain 11 hours of effort. Below 60: survival mode. 60–80: solid but demanding. 80–95: well-prepared. 95+: race-ready. CTL takes approximately 6 weeks of consistent training to shift meaningfully — you cannot shortcut it in the final weeks.',
      weight: 'Contributes 30% to the overall readiness score. High fitness without the power to use it, or power without the base to sustain it, both lead to the same result in hour 8.',
    },
    spec: {
      title: '🌲 MTB Specificity — 30% of score',
      col: '#f0a060',
      body: 'The percentage of your last 90 days\' rides that were outdoor MTB or gravel — not on Zwift or a trainer. Zwift builds fitness, but Baviaans demands more: technical terrain handling, descending confidence, sustained seated climbing position, and the specific muscular fatigue of real trails.',
      formula: 'Specificity = Outdoor MTB rides ÷ Total rides × 100%  |  Last 90 days  |  Target: ≥60%',
      detail: 'Research consistently shows that sport-specific training produces superior race-day performance over general fitness. For a 230km MTB race with 3,000m of climbing on technical terrain, indoor training cannot replicate: trail vibration and body position demands, technical descending at speed, variable power outputs from terrain changes, heat and weather acclimatisation, nutrition logistics on the bike.',
      weight: 'Contributes 30% to the overall readiness score. An athlete with high W/kg and CTL but zero outdoor MTB time will face a very different challenge on race day than their fitness metrics suggest.',
    },
  };

  const tip = document.createElement('div');
  tip.id = 'rtip';
  tip.style.cssText = 'display:none;position:fixed;z-index:9999;background:#16161e;border:.5px solid rgba(255,255,255,0.13);border-radius:14px;padding:14px 16px;width:320px;max-width:92vw;font-size:12px;color:var(--text);line-height:1.7;box-shadow:0 16px 40px rgba(0,0,0,0.7);pointer-events:none;';
  document.body.appendChild(tip);

  function showRtip(e, key) {
    const def = RTIPS[key]; if (!def) return;
    tip.innerHTML =
      '<div style="font-size:13px;font-weight:500;color:' + def.col + ';margin-bottom:8px;">' + def.title + '</div>' +
      '<div style="color:var(--muted);margin-bottom:8px;">' + def.body + '</div>' +
      '<div style="font-family:var(--mono);font-size:10px;background:rgba(255,255,255,0.04);border-radius:6px;padding:7px 10px;margin-bottom:8px;color:' + def.col + ';border-left:2px solid ' + def.col + '44;">' + def.formula + '</div>' +
      '<div style="color:var(--muted);font-size:11px;margin-bottom:8px;">' + def.detail + '</div>' +
      '<div style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.35);border-top:.5px solid rgba(255,255,255,0.07);padding-top:8px;">' + def.weight + '</div>';
    tip.style.display = 'block';
    posRtip(e);
  }
  function posRtip(e) {
    const tw=tip.offsetWidth, th=tip.offsetHeight, vw=window.innerWidth, vh=window.innerHeight;
    let x=e.clientX+14, y=e.clientY+14;
    if (x+tw>vw-8) x=e.clientX-tw-14;
    if (y+th>vh-8) y=e.clientY-th-14;
    if (y<8) y=8;
    tip.style.left=x+'px'; tip.style.top=y+'px';
  }

  function attachRtips() {
    document.querySelectorAll('[data-rtip]').forEach(function(el) {
      if (el._rtipOk) return;
      el._rtipOk = true;
      const key = el.getAttribute('data-rtip');
      el.addEventListener('mouseenter', function(e) { showRtip(e, key); });
      el.addEventListener('mousemove',  posRtip);
      el.addEventListener('mouseleave', function() { tip.style.display='none'; });
    });
  }

  const obs = new MutationObserver(attachRtips);
  obs.observe(document.body, { childList:true, subtree:true });
  attachRtips();
})();

init();
</script>
