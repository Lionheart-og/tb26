      const isRaceDay = dateKey === '2026-08-08';

      // Get session for this day
      const session = weekPlanSessions[d] || { type:'Rest', mins:0, icon:'🛌' };
      const hasActivity = actDateSet.has(dateKey);
      const barH = intensityBarHeight(session);
      const barColor = sessionBarColour(session, pc.bar);
      const isRest = session.mins === 0 && !isRaceDay;

      const CELL_H = 68;
      const cell = document.createElement('div');
      cell.style.cssText = [
        'position:relative;border-radius:6px;overflow:hidden;cursor:pointer;',
        'height:'+CELL_H+'px;',
        'border:.5px solid ' + (isToday ? 'rgba(200,240,96,0.7)' : isRaceDay ? 'rgba(240,208,96,0.8)' : 'rgba(255,255,255,0.06)') + ';',
        'background:' + (isToday ? 'rgba(200,240,96,0.05)' : isRaceDay ? 'rgba(240,208,96,0.10)' : isPast ? 'rgba(255,255,255,0.015)' : 'rgba(255,255,255,0.025)') + ';',
        'transition:border-color 0.12s;',
      ].join('');

      if (isToday) cell.style.boxShadow = '0 0 0 1.5px rgba(200,240,96,0.45), 0 0 10px rgba(200,240,96,0.12)';

      // ── Canvas power-profile waveform ──────────────────────────────────────
      if (!isRest) {
        const DPR = window.devicePixelRatio || 1;
        const cvs = document.createElement('canvas');
        cvs.className = '_profile-cell';
        cvs.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;display:block;';
        cvs._session = session;
        cvs._isPast  = isPast;
        cvs._hasAct  = hasActivity;
        cvs._isRace  = isRaceDay;
        cell.appendChild(cvs);
        const actForDay = actDateMap[dateKey] || null;
        cell._drawCanvas = function() {
          const rect = cell.getBoundingClientRect();
          const W = Math.round(rect.width) || 60;
          const H = CELL_H;
          cvs.width  = W * DPR;
          cvs.height = H * DPR;
          const ctx = cvs.getContext('2d');
          ctx.scale(DPR, DPR);

          if (isPast && hasActivity && actForDay) {
            // ── Draw ACTUAL effort profile ──────────────────────────────────────
            const ftpW2 = window._lastFtp || 239;
            const avgW2 = actForDay.average_watts || Math.round(ftpW2 * 0.72);
            const drawMax2 = avgW2 * 1.40; // scale to avg, not sprint max
            function zoneCol2(w) {
              const r = w/ftpW2;
              if(r<0.56)return'#6b7db5';if(r<0.76)return'#4a9eff';if(r<0.90)return'#60c8f0';
              if(r<1.05)return'#f0a060';if(r<1.20)return'#f06060';return'#f030a0';
            }
            const nS = 14, sW2 = W/nS;
            for(let i=0;i<nS;i++){
              const frac=i/nS;
              let pw;
              if(frac<0.15) pw=avgW2*(0.50+(frac/0.15)*0.30);
              else if(frac<0.80){const v=Math.sin(i*1.7)*0.15+Math.sin(i*0.5)*0.10;pw=avgW2*(1.0+v);if(i%5===2)pw=avgW2*1.22;if(i%7===4)pw=avgW2*0.75;}
              else pw=avgW2*(1.0-((frac-0.80)/0.20)*0.35);
              pw=Math.max(0,Math.min(drawMax2*1.05,Math.round(pw)));
              const fH=Math.max(2,Math.round((Math.min(pw,drawMax2)/drawMax2)*(H-4)));
              const y=H-fH; const col=zoneCol2(pw);
              const ri2=parseInt(col.slice(1,3),16),gi2=parseInt(col.slice(3,5),16),bi2=parseInt(col.slice(5,7),16);
              const gr=ctx.createLinearGradient(0,y,0,H);
              gr.addColorStop(0,`rgba(${Math.min(255,ri2+30)},${Math.min(255,gi2+30)},${Math.min(255,bi2+30)},0.90)`);
              gr.addColorStop(1,`rgba(${Math.max(0,ri2-15)},${Math.max(0,gi2-15)},${Math.max(0,bi2-15)},0.35)`);
              ctx.fillStyle=gr; ctx.fillRect(Math.floor(i*sW2),y,Math.ceil(sW2+0.5),fH);
              ctx.fillStyle=col; ctx.fillRect(Math.floor(i*sW2),y,Math.ceil(sW2+0.5),2);
            }
            if(actForDay.average_watts&&W>50){
              ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='8px monospace';
              ctx.fillText(Math.round(actForDay.average_watts)+'W',3,H-4);
            }
          } else {
            // ── Draw prescribed profile (dimmed if past+missed) ──────────────
            if (isPast && !hasActivity) ctx.globalAlpha = 0.28;
            drawPowerProfile(session, { width:W, height:H, getContext:()=>ctx }, 'cell');
            ctx.globalAlpha = 1;
          }
        };
      }

      // ── Icon (top-left) ────────────────────────────────────────────────────
      const iconEl = document.createElement('div');
      iconEl.style.cssText = 'position:absolute;top:3px;left:4px;font-size:10px;line-height:1;z-index:2;' +
        (isPast && !hasActivity && !isRest ? 'opacity:0.3;' : 'opacity:0.85;');
      iconEl.textContent = isRaceDay ? '🏆' : session.icon || '🛌';
      cell.appendChild(iconEl);

      // ── Duration label (bottom-centre) ─────────────────────────────────────
      if (session.mins > 0) {
        const hrs  = Math.floor(session.mins / 60);
        const mins = session.mins % 60;
        const lbl  = hrs > 0 ? hrs + 'h' + (mins > 0 ? mins + 'm' : '') : mins + 'm';
        const durEl = document.createElement('div');
        durEl.style.cssText = 'position:absolute;bottom:3px;left:0;right:0;text-align:center;z-index:2;' +
          'font-family:var(--mono);font-size:7px;font-weight:500;' +
          'color:rgba(255,255,255,' + (isPast ? '0.30' : '0.55') + ');line-height:1;';
        durEl.textContent = lbl;
        cell.appendChild(durEl);
      }

      // ── Done/missed badge (top-right) ──────────────────────────────────────
      if (isPast && !isRest) {
        const badge = document.createElement('div');
        badge.style.cssText = 'position:absolute;top:2px;right:3px;font-size:8px;z-index:2;line-height:1;' +
          (hasActivity ? 'color:rgba(96,208,144,0.95);' : 'color:rgba(240,96,96,0.55);');
        badge.textContent = hasActivity ? '✓' : '✗';
        cell.appendChild(badge);
      }

      // ── Holiday star ───────────────────────────────────────────────────────
      if (isHoliday(date) && !isRest) {
        const star = document.createElement('div');
        star.style.cssText = 'position:absolute;bottom:2px;right:3px;font-size:8px;z-index:2;opacity:0.8;';
        star.textContent = '⭐';
        cell.appendChild(star);
      }

      // ── Rich hover tooltip with mini power-profile preview ─────────────────
      cell.addEventListener('mouseenter', function(e) {
        const t = tooltip;

        // Build tooltip header
        const dateStr = date.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
        const durStr  = session.mins > 0
          ? (Math.floor(session.mins/60) > 0 ? Math.floor(session.mins/60)+'hr ' : '') +
            (session.mins%60 > 0 ? session.mins%60+'min' : '')
          : '';
        const badges  = [
          session.isInterval ? '<span style="color:#f0a060;">INTERVALS</span>' : '',
          session.isGym      ? '<span style="color:rgba(240,160,240,0.9);">STRENGTH</span>' : '',
          isHoliday(date)    ? '<span style="color:#f0d060;">🎉 HOLIDAY</span>' : '',
        ].filter(Boolean).join(' · ');

        let html = `
          <div style="font-family:var(--mono);font-size:10px;color:${pc.text};margin-bottom:5px;letter-spacing:.05em;">
            ${dateStr} &nbsp;·&nbsp; W${weekIdx+1} ${phaseName}
          </div>
          <div style="font-size:14px;font-weight:500;margin-bottom:2px;">
            ${session.icon||''}&nbsp;${session.type||'Rest'}
          </div>`;

        if (durStr || badges) {
          html += `<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px;">
            ${durStr}${durStr && badges ? ' · ' : ''}${badges}
          </div>`;
        }

        // Mini power-profile canvas in tooltip — actual if done, prescribed if not
        if (!isRest && session.mins > 0) {
          html += `<canvas id="tip-profile" width="260" height="44"
            style="display:block;width:260px;height:44px;border-radius:4px;background:rgba(0,0,0,0.3);margin-bottom:8px;"></canvas>`;
          if (hasActivity && actDateMap[dateKey]) {
            const a = actDateMap[dateKey];
            const statParts = [];
            if (a.moving_time)            statParts.push(fmtDur(a.moving_time));
            if (a.distance)               statParts.push((a.distance/1000).toFixed(1)+'km');
            if (a.total_elevation_gain)   statParts.push(Math.round(a.total_elevation_gain)+'m ↑');
            if (a.average_watts)          statParts.push(Math.round(a.average_watts)+'W avg');
            if (a.average_heartrate)      statParts.push(Math.round(a.average_heartrate)+' bpm');
            html += `<div style="font-family:var(--mono);font-size:10px;color:rgba(200,240,96,0.8);margin-bottom:4px;">✓ ACTUAL: ${statParts.join(' · ')}</div>`;
          }
        }

        // Full structured detail (interval breakdown)
        if (session.detail) {
          html += `<div style="font-size:11px;color:rgba(220,220,235,0.75);line-height:1.65;margin-bottom:6px;">${session.detail}</div>`;
        }

        // Full coaching description
        if (session.desc) {
          html += `<div style="font-size:11px;color:rgba(180,180,200,0.65);line-height:1.65;border-top:.5px solid rgba(255,255,255,0.07);padding-top:6px;">${session.desc}</div>`;
        }

        // Strava status
        if (isPast) {
          html += `<div style="font-family:var(--mono);font-size:10px;margin-top:6px;color:${hasActivity?'#60d090':'rgba(240,96,96,0.75)'};">
            ${hasActivity ? '✓ Activity recorded on Strava' : '✗ No Strava activity found'}
          </div>`;
        }

        t.innerHTML = html;
        t.style.display = 'block';

        // Draw mini profile into tooltip canvas
        if (!isRest && session.mins > 0) {
          const tc = t.querySelector('#tip-profile');
          if (tc) {
            const tctx = tc.getContext('2d');
            if (hasActivity && actDateMap[dateKey]) {
              // Draw actual effort profile
              const a = actDateMap[dateKey];
              const ftpW = 265;
              const avgW = a.average_watts || Math.round(ftpW * 0.72);
              function tcZc(w) {
                const r = w/ftpW;
                if(r<0.56)return{c:'#6b6b80'};if(r<0.76)return{c:'#4a9eff'};if(r<0.90)return{c:'#60c8f0'};
                if(r<1.05)return{c:'#f0a060'};if(r<1.20)return{c:'#f06060'};return{c:'#f060a0'};
              }
              [{x0:0,x1:39,...tcZc(Math.round(avgW*0.70))},{x0:39,x1:221,...tcZc(avgW)},{x0:221,x1:260,...tcZc(Math.round(avgW*0.65))}]
                .forEach(function(s){tctx.fillStyle=s.c+'bb';tctx.fillRect(s.x0,2,s.x1-s.x0,40);tctx.fillStyle=s.c;tctx.fillRect(s.x0,2,s.x1-s.x0,2);});
              if(a.average_watts){tctx.fillStyle='rgba(255,255,255,0.9)';tctx.font='bold 11px sans-serif';const lbl=Math.round(a.average_watts)+'W avg';tctx.fillText(lbl,(260-tctx.measureText(lbl).width)/2,26);}
            } else {
              drawPowerProfile(session, { width:260, height:44, getContext:()=>tctx }, 'card');
            }
          }
        }

        positionTooltip(e, t);
      });
      cell.addEventListener('mousemove', function(e) { positionTooltip(e, tooltip); });
      cell.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });

      // Touch support — tap to show tooltip, tap elsewhere to hide
      cell.addEventListener('touchstart', function(e) {
        e.preventDefault();
        cell.dispatchEvent(new MouseEvent('mouseenter', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }));
        positionTooltip({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }, tooltip);
        const hide = () => { tooltip.style.display = 'none'; document.removeEventListener('touchstart', hide); };
        setTimeout(() => document.addEventListener('touchstart', hide), 50);
      }, { passive: false });

      // ── Drag-and-drop rescheduling — all cells except race day ───────────────
      // Past cells can be dragged to reschedule missed/completed sessions into the future
      if (!isRaceDay) {
        cell.draggable = true;
        cell.style.cursor = 'grab';

        // Subtle grip indicator on future cells
        const grip = document.createElement('div');
        grip.style.cssText = 'position:absolute;bottom:2px;right:3px;font-size:7px;color:rgba(255,255,255,0.2);z-index:3;line-height:1;pointer-events:none;';
        grip.textContent = '⠿';
        cell.appendChild(grip);

        cell.addEventListener('dragstart', function(e) {
          tooltip.style.display = 'none';
          cell._dragDateKey = dateKey;
          cell._dragSession = session;
          cell.style.opacity = '0.45';
          cell.style.outline = '1.5px dashed rgba(200,240,96,0.7)';
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', dateKey);
          // Store on window so drop handler can access
          window._tpDragDateKey = dateKey;
          window._tpDragSession = session;
        });
        cell.addEventListener('dragend', function() {
          cell.style.opacity = '';
          cell.style.outline = '';
          window._tpDragDateKey = null;
        });
        cell.addEventListener('dragover', function(e) {
          if (!window._tpDragDateKey || window._tpDragDateKey === dateKey || isRaceDay) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          cell.style.outline = '1.5px dashed rgba(200,240,96,0.9)';
          cell.style.background = 'rgba(200,240,96,0.08)';
        });
        cell.addEventListener('dragleave', function() {
          cell.style.outline = '';
          cell.style.background = '';
        });
        cell.addEventListener('drop', function(e) {
          e.preventDefault();
          tooltip.style.display = 'none';
          cell.style.outline = '';
          cell.style.background = '';
          const srcDateKey = window._tpDragDateKey;
          const srcSession  = window._tpDragSession;
          if (!srcDateKey || srcDateKey === dateKey || isRaceDay) return;
          window._tpDragDateKey = null;

          // Format date for confirm dialog
          const fmtD = d => new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
          const confirmed = confirm(
            'Swap workouts?\n\n' +
            fmtD(srcDateKey) + '  →  ' + (srcSession.type||'Rest') + '\n  ↕\n' +
            fmtD(dateKey)    + '  →  ' + (session.type||'Rest') + '\n\n' +
            'Both the 21-week grid and upcoming 7 days will update.'
          );
          if (!confirmed) return;

          // Persist swap
          swapSessionDates(srcDateKey, dateKey);

          // Rebuild grid and upcoming block
          buildTrainingPlanVisual(window._cachedActivities || []);
          rebuildUpcomingBlock();

          // Flash
          const flash = document.createElement('div');
          flash.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18181f;border:.5px solid rgba(200,240,96,0.5);border-radius:100px;padding:10px 20px;font-family:var(--mono);font-size:12px;color:var(--accent);z-index:9999;white-space:nowrap;';
          flash.textContent = '✓ ' + fmtD(srcDateKey) + ' ↔ ' + fmtD(dateKey) + ' swapped';
          document.body.appendChild(flash);
          setTimeout(() => flash.remove(), 2500);
        });
      }

      weekRow.appendChild(cell);
    }

    inner.appendChild(weekRow);
  });

  // Scroll to current week
  wrap.innerHTML = '';
  container.appendChild(inner);
  wrap.appendChild(container);

  // Draw all power-profile canvases — use rAF to let layout settle first,
  // then a second rAF to ensure paint width is measured correctly
  function drawAllCells() {
    inner.querySelectorAll('canvas._profile-cell').forEach(cvs => {
      const cell = cvs.parentElement;
      if (cell && cell._drawCanvas) cell._drawCanvas();
    });
  }
  requestAnimationFrame(() => requestAnimationFrame(drawAllCells));

  // Also redraw on resize (handles narrow screens + zoom changes)
  if (window._tpResizeObs) window._tpResizeObs.disconnect();
  window._tpResizeObs = new ResizeObserver(drawAllCells);
  window._tpResizeObs.observe(container);

  // Auto-scroll to current week
  setTimeout(() => {
    const nowBadge = wrap.querySelector('div[style*="NOW"]');
    if (nowBadge) {
      const rowEl = nowBadge.closest('div[style*="grid-template-columns"]');
      if (rowEl) rowEl.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  }, 350);
}

function positionTooltip(e, t) {
  const margin = 14;
  const tw = 296;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  if (x + tw > window.innerWidth - 8)  x = e.clientX - tw - margin;
  if (x < 8) x = 8;
  const th = t.offsetHeight || 220;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - margin;
  if (y < 8) y = 8;
  t.style.left = x + 'px';
  t.style.top  = y + 'px';
}

// ── Today's full block: form suggestion + workout ────────────────────────────
function buildTodayFullBlock(wrap, weekPlan, todayDay, sug, todayActivity, ftp) {
  if (!wrap) return;

  const wod = weekPlan.find(function(s) { return s.day === todayDay; });
  const hasWorkout   = wod && wod.mins > 0;
  const hasCompleted = !!todayActivity;

  const outer = document.createElement('div');
  outer.style.cssText = 'background:var(--bg3);border:.5px solid var(--border2);border-radius:14px;overflow:hidden;';

  // ── Top: form suggestion / completion header ──────────────────────────────
  const sugDiv = document.createElement('div');
  const sugBorder = (hasWorkout || hasCompleted) ? 'border-bottom:.5px solid var(--border);' : '';
  sugDiv.style.cssText = 'padding:1.25rem 1.5rem;' + sugBorder;
  const sugHead = document.createElement('div');
  sugHead.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:.75rem;';

  if (hasCompleted) {
    const act = todayActivity;
    const durStr = fmtDur(act.moving_time);
    const distKm = act.distance ? (act.distance/1000).toFixed(1) : null;
    const elev   = act.total_elevation_gain ? Math.round(act.total_elevation_gain)+'m' : null;
    sugHead.innerHTML = '<span style="font-size:20px;">✅</span><span style="font-size:15px;font-weight:500;">Session complete — '+act.name+'</span>';
    sugDiv.appendChild(sugHead);
    const meta = document.createElement('div');
    meta.style.cssText = 'font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:.75rem;';
    meta.innerHTML =
      '<span style="color:var(--text)">'+durStr+'</span>'+
      (distKm ? ' &nbsp;·&nbsp; <span style="color:var(--text)">'+distKm+'km</span>' : '')+
      (elev   ? ' &nbsp;·&nbsp; <span style="color:var(--text)">'+elev+' elevation</span>' : '')+
      (act.average_heartrate ? ' &nbsp;·&nbsp; <span style="color:var(--text)">'+Math.round(act.average_heartrate)+' bpm avg</span>' : '')+
      (act.average_watts     ? ' &nbsp;·&nbsp; <span style="color:var(--accent)">'+Math.round(act.average_watts)+'W avg</span>' : '')+
      (act.suffer_score      ? ' &nbsp;·&nbsp; <span style="color:#f0a060">suffer '+act.suffer_score+'</span>' : '');
    sugDiv.appendChild(meta);
    if (hasWorkout) {
      const actualMin = Math.round(act.moving_time/60);
      const pct = Math.round(actualMin/wod.mins*100);
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;';
      const pctCol = pct>=90?'#60d090':pct>=70?'#f0d060':'#f06060';
      [{label:'Prescribed',val:wod.mins+'min',col:'var(--muted)'},{label:'Completed',val:actualMin+'min',col:'var(--text)'},{label:'Compliance',val:pct+'%',col:pctCol}]
        .forEach(function(item){
          const p=document.createElement('span');
          p.style.cssText='font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:100px;border:.5px solid var(--border2);background:var(--bg2);color:'+item.col+';';
          p.innerHTML='<span style="opacity:.6">'+item.label+':</span> '+item.val;
          row.appendChild(p);
        });
      sugDiv.appendChild(row);
    }
  } else {
    sugHead.innerHTML = '<span style="font-size:20px;">'+sug.icon+'</span><span style="font-size:15px;font-weight:500;">'+sug.title+'</span>';
    sugDiv.appendChild(sugHead);
    const sugBody = document.createElement('div');
    sugBody.style.cssText = 'font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:.75rem;';
    sugBody.innerHTML = sug.body;
    sugDiv.appendChild(sugBody);
    const pills = document.createElement('div');
    pills.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;';
    sug.pills.forEach(function(p,i){
      const pill=document.createElement('span');
      pill.className='pill'+(i===0?' p1':i===1?' p2':'');
      pill.textContent=p;
      pills.appendChild(pill);
    });
    sugDiv.appendChild(pills);
  }
  outer.appendChild(sugDiv);

  // ── Completed activity detail ─────────────────────────────────────────────
  if (hasCompleted) {
    const act = todayActivity;
    const ftpW = ftp ? ftp.watts : 265;
    const compDiv = document.createElement('div');
    compDiv.style.cssText = 'padding:1.25rem 1.5rem;';

    const secLbl = document.createElement('div');
    secLbl.style.cssText = 'font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;';
    secLbl.textContent = "Today's completed session — "+todayDay;
    compDiv.appendChild(secLbl);

    // Power profile
    const isRide = ['Ride','MountainBikeRide','VirtualRide','GravelRide'].includes(act.sport_type||act.type);
    const isGym  = ['WeightTraining','Workout'].includes(act.sport_type||act.type);
    const PROF_H = 210; // extra height for time axis
    const profileBg = document.createElement('div');
    profileBg.style.cssText = 'background:rgba(0,0,0,0.25);border-radius:8px;overflow:hidden;margin-bottom:14px;height:'+PROF_H+'px;position:relative;';
    if (isRide) {
      const cvs = document.createElement('canvas');
      cvs.style.cssText = 'display:block;width:100%;height:'+PROF_H+'px;';
      profileBg.appendChild(cvs);
      const mark = document.createElement('div');
      mark.style.cssText = 'position:absolute;top:4px;right:8px;font-family:var(--mono);font-size:9px;color:rgba(200,240,96,0.6);letter-spacing:.08em;';
      mark.textContent = 'ACTUAL EFFORT';
      profileBg.appendChild(mark);
      // Use setTimeout to ensure the element is laid out before reading offsetWidth
      setTimeout(function(){
        cvs.width  = cvs.offsetWidth || 800;
        cvs.height = PROF_H;
        if (cvs.width < 10) return; // safety guard
        const ctx = cvs.getContext('2d');
        const W = cvs.width, H = PROF_H;
        const PAD_TOP = 8, PAD_BOT = 22;
        const PAD_LEFT = 28, PAD_RIGHT = 36;
        const drawW = W - PAD_LEFT - PAD_RIGHT;
        const drawH = H - PAD_TOP - PAD_BOT;
        const avgW  = act.average_watts || Math.round(ftpW * 0.72);
        const avgHR = act.average_heartrate || 0;
        const maxHR = act.max_heartrate || (avgHR ? avgHR * 1.15 : 0);
        const minHR = Math.max(50, avgHR * 0.72);

        // Safe zone config — always use defaults if _zoneConfig not ready
        const DEFAULT_POWER_ZONES = [
          { max:0.56, col:'#6b7db5', label:'Z1' },
          { max:0.76, col:'#4a9eff', label:'Z2' },
          { max:0.90, col:'#60c8f0', label:'Z3' },
          { max:1.05, col:'#f0a060', label:'Z4' },
          { max:1.20, col:'#f06060', label:'Z5' },
          { max:99,   col:'#f030a0', label:'Z6' },
        ];
        const ZONES = (window._zoneConfig && window._zoneConfig.power && window._zoneConfig.power.length >= 5)
          ? window._zoneConfig.power.map(z => ({ max:z.maxFrac, col:z.col, label:z.label }))
          : DEFAULT_POWER_ZONES;
        function zoneColour(w) {
          const r = w / ftpW;
          return (ZONES.find(z => r < z.max) || ZONES[ZONES.length-1]).col;
        }

        const ZONE_CEIL = { Z1:0.20, Z2:0.40, Z3:0.58, Z4:0.76, Z5:0.92, Z6:1.0 };
        const ZONE_BANDS = { Z1:[0,0.56], Z2:[0.56,0.76], Z3:[0.76,0.90], Z4:[0.90,1.05], Z5:[1.05,1.20], Z6:[1.20,1.60] };
        function zoneOfW(w) {
          const r = w/ftpW;
          if(r<0.56)return'Z1'; if(r<0.76)return'Z2'; if(r<0.90)return'Z3';
          if(r<1.05)return'Z4'; if(r<1.20)return'Z5'; return'Z6';
        }
        function zoneBrightness(w) {
          const z=zoneOfW(w), bd=ZONE_BANDS[z]||[0,0.56], r=w/ftpW;
          return Math.max(0,Math.min(1,(r-bd[0])/(bd[1]-bd[0])));
        }
        function zoneCeilY(z) {
          return PAD_TOP + drawH - Math.round((ZONE_CEIL[z]||0.20) * drawH);
        }

        // Scale
        const drawMax = avgW * 1.40;

        // ── Left axis: Power zone labels — aligned to bar ceiling heights ─────
        ctx.font = '500 8px monospace';
        ['Z1','Z2','Z3','Z4','Z5'].forEach(function(zn, zi) {
          const y = zoneCeilY(zn);
          const col = ZONES[zi].col;
          // Dashed boundary line
          ctx.strokeStyle = col + '22';
          ctx.setLineDash([2,4]); ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(PAD_LEFT, y); ctx.lineTo(PAD_LEFT+drawW, y); ctx.stroke();
          ctx.setLineDash([]);
          // Label
          ctx.fillStyle = col + 'cc'; ctx.textAlign = 'right';
          ctx.fillText(zn, PAD_LEFT - 3, y + 3);
        });

        // Build power segments
        const nSegs = 26;
        const segW  = drawW / nSegs;
        const segs  = [];
        for (let i = 0; i < nSegs; i++) {
          const frac = i / nSegs;
          let power;
          if      (frac < 0.12) { power = avgW * (0.45 + (frac/0.12) * 0.35); }
          else if (frac < 0.22) { power = avgW * (0.80 + ((frac-0.12)/0.10) * 0.20); }
          else if (frac < 0.82) {
            const v = Math.sin(i*1.7)*0.15 + Math.sin(i*0.5)*0.10;
            power = avgW * (1.0 + v);
            if (i%5===2) power = avgW * (1.22 + Math.abs(Math.sin(i))*0.15);
            if (i%7===4) power = avgW * 0.72;
          }
          else if (frac < 0.92) { power = avgW * (1.0 - ((frac-0.82)/0.10)*0.22); }
          else                  { power = avgW * (0.78 - ((frac-0.92)/0.08)*0.28); }
          segs.push({ x: PAD_LEFT + i*segW, w: segW+0.5, power: Math.max(0, Math.round(power)) });
        }

        // Build HR points (used for both drawing and hover)
        const durMins = Math.round((act.moving_time||0)/60);
        const hrRange = avgHR && maxHR ? maxHR - minHR : 1;
        const hrPts = segs.map(function(seg,i){
          const frac=i/nSegs;
          let hr;
          if(frac<0.12) hr=minHR+hrRange*(0.15+(frac/0.12)*0.40);
          else if(frac<0.85){const drift=(frac-0.12)/0.73*0.15;const react=Math.sin(i*1.4)*0.08+Math.sin(i*0.7)*0.05;hr=avgHR+hrRange*(drift+react-0.06);}
          else hr=avgHR*(1.01-((frac-0.85)/0.15)*0.20);
          hr=Math.max(minHR,Math.min(maxHR||180,hr));
          const hrY=PAD_TOP+drawH-Math.round(((hr-minHR)/hrRange)*drawH*0.80);
          return {x:seg.x+seg.w/2, y:hrY, hr:Math.round(hr), power:seg.power, mins:Math.round((i/nSegs)*durMins)};
        });

        // Draw power bars — zone ceiling height, brightness by actual watts
        segs.forEach(function(seg, i) {
          const z=zoneOfW(seg.power), ceil=ZONE_CEIL[z]||0.20;
          const fillH=Math.max(3,Math.round(ceil*drawH));
          const y=PAD_TOP+drawH-fillH;
          const col=zoneColour(seg.power);
          const bright=zoneBrightness(seg.power);
          const ri=parseInt(col.slice(1,3),16), gi=parseInt(col.slice(3,5),16), bi=parseInt(col.slice(5,7),16);
          const topA=0.55+bright*0.35, botA=0.20+bright*0.20;
          const rH=Math.min(255,ri+Math.round(bright*30)), gH=Math.min(255,gi+Math.round(bright*30)), bH=Math.min(255,bi+Math.round(bright*30));
          const grad=ctx.createLinearGradient(0,y,0,y+fillH);
          grad.addColorStop(0,   `rgba(${rH},${gH},${bH},${topA})`);
          grad.addColorStop(0.6, `rgba(${ri},${gi},${bi},${(topA+botA)/2})`);
          grad.addColorStop(1,   `rgba(${Math.max(0,ri-10)},${Math.max(0,gi-10)},${Math.max(0,bi-10)},${botA})`);
          ctx.fillStyle=grad; ctx.fillRect(Math.floor(seg.x),y,Math.ceil(seg.w),fillH);
          ctx.fillStyle=`rgba(${rH},${gH},${bH},0.95)`; ctx.fillRect(Math.floor(seg.x),y,Math.ceil(seg.w),2);
          // Hard edge at zone transitions only
          const next=segs[i+1];
          if(next&&zoneOfW(next.power)!==z){ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(Math.floor(seg.x+seg.w-1),PAD_TOP,2,drawH);}
        });

        // Avg power reference line
        const avgY=PAD_TOP+drawH-Math.round((avgW/drawMax)*drawH);
        ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.setLineDash([4,4]); ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(PAD_LEFT,avgY); ctx.lineTo(PAD_LEFT+drawW,avgY); ctx.stroke();
        ctx.setLineDash([]);
        if(act.average_watts){ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(Math.round(act.average_watts)+'W avg',PAD_LEFT+drawW/2,avgY>PAD_TOP+14?avgY-4:avgY+14);}

        // ── HR overlay — uses pre-built hrPts ────────────────────────────────
        if (avgHR && maxHR) {
          ctx.beginPath(); ctx.moveTo(hrPts[0].x,hrPts[0].y);
          for(let i=1;i<hrPts.length;i++) ctx.lineTo(hrPts[i].x,hrPts[i].y);
          ctx.strokeStyle='rgba(240,160,240,0.85)'; ctx.lineWidth=1.5; ctx.stroke();
          const HR_ZONES=[{pct:0.60,label:'Z1',col:'#6b7db5'},{pct:0.70,label:'Z2',col:'#4a9eff'},{pct:0.80,label:'Z3',col:'#60c8f0'},{pct:0.90,label:'Z4',col:'#f0a060'},{pct:1.00,label:'Z5',col:'#f06060'}];
          ctx.font='500 8px monospace'; ctx.textAlign='left';
          HR_ZONES.forEach(function(hz){
            const hrBound=(maxHR||180)*hz.pct;
            if(hrBound<minHR||hrBound>maxHR)return;
            const hrY=PAD_TOP+drawH-Math.round(((hrBound-minHR)/hrRange)*drawH*0.80);
            if(hrY<PAD_TOP||hrY>PAD_TOP+drawH)return;
            ctx.strokeStyle=hz.col+'18'; ctx.setLineDash([1,5]); ctx.lineWidth=0.5;
            ctx.beginPath(); ctx.moveTo(PAD_LEFT,hrY); ctx.lineTo(PAD_LEFT+drawW,hrY); ctx.stroke(); ctx.setLineDash([]);
            ctx.fillStyle=hz.col+'cc'; ctx.fillText(hz.label,PAD_LEFT+drawW+4,hrY+3);
          });
          ctx.fillStyle='rgba(240,160,240,0.8)'; ctx.font='500 8px monospace'; ctx.textAlign='left';
          ctx.fillText(Math.round(avgHR)+' bpm',PAD_LEFT+drawW+4,hrPts[Math.floor(hrPts.length/2)].y-4);
        }

        // ── Time axis ─────────────────────────────────────────────────────────
        const axisY=PAD_TOP+drawH+2;
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(PAD_LEFT,axisY); ctx.lineTo(PAD_LEFT+drawW,axisY); ctx.stroke();
        ctx.font='500 8px monospace'; ctx.textAlign='center';
        for(let t=0;t<=5;t++){
          const px=PAD_LEFT+Math.round((t/5)*drawW);
          const mins=Math.round((t/5)*durMins);
          const lbl=mins>=60?Math.floor(mins/60)+'h'+(mins%60?String(mins%60).padStart(2,'0')+'m':''): mins+'m';
          ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(px,axisY,1,4);
          ctx.fillStyle='rgba(255,255,255,0.38)'; ctx.fillText(lbl,Math.max(PAD_LEFT+10,Math.min(PAD_LEFT+drawW-10,px)),axisY+12);
        }

        // ── Crosshair tooltip ─────────────────────────────────────────────────
        const tip=document.createElement('div');
        tip.style.cssText='position:absolute;display:none;pointer-events:none;background:#16161e;border:.5px solid rgba(255,255,255,0.14);border-radius:8px;padding:6px 10px;font-family:var(--mono);font-size:10px;color:var(--text);line-height:1.8;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.6);z-index:10;';
        profileBg.appendChild(tip);
        cvs.addEventListener('mousemove',function(e){
          const rect=cvs.getBoundingClientRect();
          const mx=(e.clientX-rect.left)*(cvs.width/rect.width);
          if(mx<PAD_LEFT||mx>PAD_LEFT+drawW){tip.style.display='none';return;}
          let closest=segs[0],closestIdx=0,minD=Infinity;
          segs.forEach(function(seg,i){const d=Math.abs(seg.x+seg.w/2-mx);if(d<minD){minD=d;closest=seg;closestIdx=i;}});
          const z=zoneOfW(closest.power), zCol=zoneColour(closest.power);
          const hp=hrPts[closestIdx], timeStr=hp?hp.mins>=60?Math.floor(hp.mins/60)+'h'+String(hp.mins%60).padStart(2,'0')+'m':hp.mins+'m':'—';
          tip.innerHTML='<span style="color:'+zCol+';font-weight:600;">'+z+'</span> · <span style="color:'+zCol+'">'+Math.round(closest.power)+'W</span>'+
            (hp&&avgHR?' · <span style="color:rgba(240,160,240,0.9);">'+Math.round(hp.hr||avgHR)+' bpm</span>':'')+
            '<br><span style="color:var(--muted)">⏱ '+timeStr+'</span>';
          tip.style.display='block';
          const relX=e.clientX-rect.left, relY=e.clientY-rect.top;
          tip.style.left=(relX+14+160>rect.width?relX-168:relX+14)+'px';
          tip.style.top=Math.max(2,relY-24)+'px';
          // Crosshair lines
          const cx=closest.x+closest.w/2;
          ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.30)'; ctx.setLineDash([3,3]); ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(cx,PAD_TOP); ctx.lineTo(cx,PAD_TOP+drawH); ctx.stroke();
          if(hp&&avgHR){ctx.beginPath(); ctx.moveTo(PAD_LEFT,hp.y); ctx.lineTo(PAD_LEFT+drawW,hp.y); ctx.stroke();}
          ctx.setLineDash([]); ctx.restore();
        });
        cvs.addEventListener('mouseleave',function(){tip.style.display='none';}); 


      }, 80); // 80ms gives the DOM time to lay out
    } else {
      profileBg.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:'+PROF_H+'px;font-size:28px;">'+(isGym?'🏋️':emoji(act.sport_type||act.type))+'</div>';
    }
    compDiv.appendChild(profileBg);

    // Stats grid
    const statsGrid = document.createElement('div');
    statsGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px;';
    [
      {label:'Duration',val:fmtDur(act.moving_time)},
      act.distance?{label:'Distance',val:(act.distance/1000).toFixed(1)+'km'}:null,
      act.total_elevation_gain?{label:'Elevation',val:Math.round(act.total_elevation_gain)+'m'}:null,
      act.average_watts?{label:'Avg power',val:Math.round(act.average_watts)+'W'}:null,
      act.max_watts?{label:'Max power',val:Math.round(act.max_watts)+'W'}:null,
      act.average_heartrate?{label:'Avg HR',val:Math.round(act.average_heartrate)+' bpm'}:null,
      act.max_heartrate?{label:'Max HR',val:Math.round(act.max_heartrate)+' bpm'}:null,
      (act.average_watts&&ftp)?{label:'IF',val:(act.average_watts/ftpW).toFixed(2)}:null,
      (act.average_watts&&ftp)?{label:'W/kg',val:(act.average_watts/ATHLETE_WEIGHT_KG).toFixed(2)}:null,
    ].filter(Boolean).forEach(function(s){
      const cell=document.createElement('div');
      cell.style.cssText='background:var(--bg2);border:.5px solid var(--border);border-radius:8px;padding:8px 10px;';
      cell.innerHTML='<div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;">'+s.label+'</div><div style="font-size:14px;color:var(--text);">'+s.val+'</div>';
      statsGrid.appendChild(cell);
    });
    compDiv.appendChild(statsGrid);

    // Analysis
    const ftpW2 = ftpW;
    const lines2 = [];
    const durMin2 = Math.round(act.moving_time/60);
    const distKm2 = act.distance?(act.distance/1000).toFixed(1):null;
    if(wod&&wod.mins>0){const pct=Math.round(durMin2/wod.mins*100);if(pct>=95)lines2.push('Duration hit — '+durMin2+'min vs '+wod.mins+'min prescribed. Full session executed.');else if(pct>=80)lines2.push('Slightly short at '+durMin2+'min ('+pct+'% of the '+wod.mins+'min prescribed). Solid effort overall.');else lines2.push('Session cut short at '+durMin2+'min ('+pct+'% of prescribed). Listen to the body — quality beats length.');}
    if(act.average_watts&&ftpW2){const IF=act.average_watts/ftpW2;if(IF>0.88)lines2.push('High intensity factor ('+IF.toFixed(2)+') — hard effort. Ensure adequate recovery before the next quality session.');else if(IF>0.75)lines2.push('Solid aerobic-threshold effort (IF '+IF.toFixed(2)+'). Right intensity band for endurance development.');else if(IF>0.60)lines2.push('Good Zone 2 execution (IF '+IF.toFixed(2)+'). Aerobic base work done correctly.');else lines2.push('Easy recovery-pace effort (IF '+IF.toFixed(2)+'). Well-managed low-intensity session.');}
    if(act.total_elevation_gain){if(act.total_elevation_gain>1500)lines2.push(Math.round(act.total_elevation_gain)+'m of climbing — excellent Baviaans-specific elevation load.');else if(act.total_elevation_gain>500)lines2.push(Math.round(act.total_elevation_gain)+'m elevation — good climbing stimulus.');}
    if(act.average_heartrate&&act.max_heartrate){const r=act.average_heartrate/act.max_heartrate;if(r<0.72)lines2.push('Heart rate well-controlled — aerobic ceiling respected throughout.');else if(r<0.82)lines2.push('Moderate cardiac load — appropriate for a quality session.');else lines2.push('Elevated average HR — high cardiac demand. Factor in extra recovery.');}
    if(lines2.length){
      const aBox=document.createElement('div');
      aBox.style.cssText='font-size:13px;color:rgba(195,195,215,0.82);line-height:1.8;padding:10px 14px;background:rgba(0,0,0,0.15);border-left:2px solid rgba(200,240,96,0.35);border-radius:0 6px 6px 0;margin-bottom:12px;';
      aBox.textContent=lines2.join(' ');
      compDiv.appendChild(aBox);
    }

    // Toggle prescribed
    if(hasWorkout){
      const toggle=document.createElement('button');
      toggle.style.cssText='background:transparent;border:.5px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--muted);font-size:12px;font-family:var(--mono);cursor:pointer;touch-action:manipulation;';
      toggle.textContent='▾ Show prescribed workout';
      let shown=false;
      const prescDiv=document.createElement('div');
      prescDiv.style.cssText='display:none;margin-top:12px;padding-top:12px;border-top:.5px solid var(--border);';
      toggle.addEventListener('click',function(){shown=!shown;prescDiv.style.display=shown?'block':'none';toggle.textContent=shown?'▴ Hide prescribed workout':'▾ Show prescribed workout';});
      buildPrescribedWorkoutContent(prescDiv,wod,todayDay);
      compDiv.appendChild(toggle);
      compDiv.appendChild(prescDiv);
    }
    outer.appendChild(compDiv);
    wrap.appendChild(outer);
    return;
  }

  // ── No completed activity: show prescribed ────────────────────────────────
  if(!hasWorkout){wrap.appendChild(outer);return;}
  const wodDiv=document.createElement('div');
  wodDiv.style.cssText='padding:1.25rem 1.5rem;';
  buildPrescribedWorkoutContent(wodDiv,wod,todayDay);
  outer.appendChild(wodDiv);
  wrap.appendChild(outer);
}

// ── Rich recent activities list ───────────────────────────────────────────────
function buildRecentActivities(activities, ftp) {
  const wrap = document.getElementById('recent-activities-list');
  if (!wrap) return;
  wrap.innerHTML = '';
  const ftpW = ftp ? ftp.watts : 265;

  activities.forEach(function(a) {
    const avgW  = a.average_watts          ? Math.round(a.average_watts)          : null;
    const npW   = a.weighted_average_watts ? Math.round(a.weighted_average_watts) : null;
    const IF    = (avgW && ftpW)           ? (avgW / ftpW).toFixed(2)             : null;
    const TSS   = (npW && ftpW && a.moving_time)
      ? Math.round(Math.pow(npW / ftpW, 2) * (a.moving_time / 3600) * 100) : null;
    const distKm = a.distance             ? (a.distance / 1000).toFixed(1)        : null;
    const elev   = a.total_elevation_gain ? Math.round(a.total_elevation_gain)    : null;

    // Build one continuous dot-separated meta string with ALL available metrics
    const parts = [];
    parts.push(fmtDate(a.start_date));
    if (distKm)                  parts.push(distKm + 'km');
    if (a.moving_time)           parts.push(fmtDur(a.moving_time));
    if (elev)                    parts.push(elev + 'm ↑');
    if (avgW)                    parts.push(avgW + 'W avg');
    if (npW)                     parts.push('NP ' + npW + 'W');
    if (IF)                      parts.push('IF ' + IF);
    if (TSS)                     parts.push('TSS ' + TSS);
    if (a.average_heartrate)     parts.push(Math.round(a.average_heartrate) + ' bpm');
    if (a.suffer_score)          parts.push('suffer ' + a.suffer_score);

    const card = document.createElement('div');
    card.className = 'act-row';

    const emojiDiv = document.createElement('div');
    emojiDiv.className = 'act-emoji';
    emojiDiv.textContent = emoji(a.type);

    const info = document.createElement('div');
    info.className = 'act-info';
    info.innerHTML =
      '<div class="act-name">' + a.name + '</div>' +
      '<div class="act-meta">' + parts.join(' · ') + '</div>';

    const loadDiv = document.createElement('div');
    loadDiv.className = 'act-load';
    loadDiv.innerHTML = load(a) + '<span>load</span>';

    card.appendChild(emojiDiv);
    card.appendChild(info);
    card.appendChild(loadDiv);
    wrap.appendChild(card);
  });
}


// ── Week plan drag-and-drop override system ────────────────────────────────────
// Overrides stored as { weekKey: { 'Mon': dayIndex, 'Tue': dayIndex, ... } }
// weekKey = Monday ISO date of the week. DayIndex = 0-6 (Mon-Sun) for position in week.
// ── Session override system — date-keyed, works across week boundaries ─────────
// Stores: { 'YYYY-MM-DD': { sessionContent } } — the session assigned to that date
// When a user drags workout A (on date X) to date Y, we store:
//   overrides[X] = original session of Y  (Y's content goes to X)
//   overrides[Y] = original session of X  (X's content goes to Y)
const SESSION_OVERRIDES_SK = 'session_overrides_v2';

function loadSessionOverrides() {
  try { return JSON.parse(localStorage.getItem(SESSION_OVERRIDES_SK) || '{}'); } catch(e) { return {}; }
}
function saveSessionOverrides(o) {
  try { localStorage.setItem(SESSION_OVERRIDES_SK, JSON.stringify(o)); } catch(e) {}
}

// Get the effective session for a given date — override if exists, else generated plan
function getSessionForDate(date) {
  const dateKey = localDateKey(date instanceof Date ? date : new Date(date));
  const overrides = loadSessionOverrides();
  // Parse dateKey back as LOCAL date (not UTC)
  const [y,m,dd] = dateKey.split('-').map(Number);
  const localDate = new Date(y, m-1, dd, 12, 0, 0); // noon local — safe for getDay()
  const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][localDate.getDay()];

  if (overrides[dateKey]) {
    return { ...overrides[dateKey], day: dayName, date: localDate };
  }
  // No override — generate from plan
  const weekPlan = generateWeekPlan(localDate);
  return weekPlan.find(function(s) { return s.day === dayName; }) || { type:'Rest', mins:0, icon:'🛌', day:dayName, date:localDate };
}

// Swap sessions between two dates and persist
function swapSessionDates(dateKeyA, dateKeyB) {
  const overrides = loadSessionOverrides();
  // Get current effective content for each date (without day/date fields)
  function contentOnly(s) { const {day,date,...rest}=s; return rest; }
  const sessionA = contentOnly(getSessionForDate(dateKeyA));
  const sessionB = contentOnly(getSessionForDate(dateKeyB));
  overrides[dateKeyA] = sessionB;
  overrides[dateKeyB] = sessionA;
  saveSessionOverrides(overrides);
}

// Legacy compat shims (used by old code paths — now no-ops)
function getWeekKey() { return localDateKey(PLAN_MONDAY); }
function loadWeekOverrides() { return {}; }
function saveWeekOverrides() {}
function applyWeekOverrides(weekPlan) { return weekPlan; }

// ── Upcoming 7 days — read-only card list (dragging done in TP grid) ──────────
function buildUpcomingWeekCards(container, weekPlan) {
  container.innerHTML = '';
  weekPlan.forEach(function(session) {
    const card = buildWorkoutCard(session, false);
    // Show MOVED badge if this date has an override
    const dateKey = localDateKey(session.date);
    if (loadSessionOverrides()[dateKey]) {
      card.style.position = 'relative';
      const badge = document.createElement('div');
      badge.style.cssText = 'position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:8px;color:#f0d060;border:.5px solid rgba(240,208,96,0.4);border-radius:100px;padding:1px 6px;background:rgba(240,208,96,0.08);';
      badge.textContent = 'MOVED';
      card.appendChild(badge);
    }
    container.appendChild(card);
  });
}

// Rebuild just the upcoming 7-day list (called after TP grid swap)
function rebuildUpcomingBlock() {
  const rowsEl = document.getElementById('week-plan-rows');
  if (!rowsEl) return;
  const upcoming = [];
  for (let i = 1; i <= 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + i); d.setHours(0,0,0,0);
    upcoming.push(getSessionForDate(d));
  }
  buildUpcomingWeekCards(rowsEl, upcoming);
}

80% of your training is genuinely easy — Zone 1–2, conversational pace, fat-burning. The remaining 20% is hard structured work: torque intervals, sub-threshold blocks, over/unders, stochastic race-simulation. Nothing in between.

    <div id="today-full-block" style="margin-bottom:1.5rem;"></div>

    <div id="week-plan-rows" style="display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem;"></div>

    <!-- Recent activities — rich cards built by JS -->

    <div id="recent-activities-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem;"></div>
  `;

  document.getElementById('dashboard').style.display = 'block';

  // ── Build today's combined suggestion + workout block ─────────────────────
  // Find today's actual Strava activity if one exists
  const todayStr = localDateKey(new Date());
  const todayActivity = activities.find(function(a) {
    return localDateKey(new Date(a.start_date)) === todayStr;
  }) || null;

  buildTodayFullBlock(
    document.getElementById('today-full-block'),
    weekPlan, todayDay, sug, todayActivity, ftp
  );

  // Cache activities and FTP for drag-and-drop TP rebuild and Zwift generator
  window._cachedActivities = activities;
  window._lastFtp = ftp.watts || 200;

  // Build 21-week TrainingPeaks-style visual
  buildTrainingPlanVisual(activities);

  // Build weekly workout cards
  const titleEl = document.getElementById('week-plan-title');
  const hintEl  = document.getElementById('week-plan-hint');
  const rowsEl  = document.getElementById('week-plan-rows');

  if (hintEl)  hintEl.innerHTML = '⬇ Zwift downloads structured workout file &nbsp;·&nbsp; 📅 Calendar pre-filled &nbsp;·&nbsp; <span style="color:rgba(240,160,240,0.9)">STRENGTH</span> = gym &nbsp;·&nbsp; <span style="color:rgba(240,160,96,0.9)">INTERVALS</span> = structured ride &nbsp;·&nbsp; <span style="color:var(--muted)">drag workouts in the 21-week grid above to reschedule</span>';
  if (rowsEl) {
    buildUpcomingWeekCards(rowsEl, weekPlan);
  }

  // Build rich recent activities list
  buildRecentActivities(recent, ftp);

  // ── PMC Chart with colour-coded Form line + W/kg ─────────────────────────
  const sl = hist.slice(-84);
  function formZoneColour(v) {
    if (v > 20)  return '#f0d060';
    if (v > 10)  return '#60c8f0';
    if (v > -5)  return '#9090a8';
    if (v > -30) return '#60d090';
    return '#f06060';
  }

  // ── Weight log — keyed by ISO date string, persisted in localStorage ─────────
  // Historic default: 80kg. User logs weight weekly; intermediate days interpolate.
  const WEIGHT_LOG_SK = 'weight_log_v1';

  function loadWeightLog() {
    try { return JSON.parse(localStorage.getItem(WEIGHT_LOG_SK) || '{}'); } catch(e) { return {}; }
  }
  function saveWeightLog(log) {
    try { localStorage.setItem(WEIGHT_LOG_SK, JSON.stringify(log)); } catch(e) {}
  }
  function logWeight(kg, dateStr) {
    const log = loadWeightLog();
    log[dateStr] = kg;
    saveWeightLog(log);
  }

  // Get weight for a given date by interpolating between known log entries
  // Falls back to 80kg for dates before any log entry
  function weightForDate(dateStr, log) {
    const logEntries = Object.entries(log).sort((a,b) => a[0].localeCompare(b[0]));
    if (logEntries.length === 0) return 80;
    // Exact match
    if (log[dateStr] !== undefined) return log[dateStr];
    // Find surrounding entries
    const before = logEntries.filter(([d]) => d <= dateStr);
    const after  = logEntries.filter(([d]) => d >  dateStr);
    if (before.length === 0) return after[0][1]; // before all entries → use first known
    if (after.length  === 0) return before[before.length-1][1]; // after all → use last known
    // Interpolate between nearest before and after
    const [d0, w0] = before[before.length-1];
    const [d1, w1] = after[0];
    const t0 = new Date(d0).getTime(), t1 = new Date(d1).getTime(), tx = new Date(dateStr).getTime();
    const t = (tx - t0) / (t1 - t0);
    return w0 + (w1 - w0) * t;
  }

  // W/kg per day using weight log + interpolation
  function wkgSeries(weightKgOverride) {
    const log = loadWeightLog();
    return sl.map(h => {
      if (!h.ctl || h.ctl <= 0) return null;
      const dateStr = localDateKey(h.date);
      const kg = weightKgOverride != null ? weightKgOverride : weightForDate(dateStr, log);
      return +(ftp.watts / kg).toFixed(2);
    });
  }

  // ── Weekly weight prompt ───────────────────────────────────────────────────────
  // Show once per week — Monday — asking user to log current weight
  function checkWeeklyWeightPrompt() {
    const today = new Date(); today.setHours(0,0,0,0);
    const todayStr = localDateKey(today);
    const lastPrompt = localStorage.getItem('weight_prompt_last') || '';
    // Get start of this week (Monday)
    const dayOfWeek = today.getDay() || 7;
    const monday = new Date(today); monday.setDate(today.getDate() - dayOfWeek + 1);
    const mondayStr = localDateKey(monday);
    // Already prompted this week
    if (lastPrompt >= mondayStr) return;

    // Show prompt banner below metrics
    const dashboard = document.getElementById('dashboard');
    if (!dashboard) return;
    const prompt = document.createElement('div');
    prompt.id = 'weight-prompt';
    prompt.style.cssText = 'background:#18181f;border:.5px solid rgba(200,240,96,0.35);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;';
    prompt.innerHTML = `
      <div style="flex:1;min-width:200px;">
        <div style="font-size:13px;font-weight:500;color:var(--accent);margin-bottom:4px;">⚖️ Weekly weigh-in</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.6;">Log your weight to keep the W/kg chart accurate. Last entry: <span id="last-weight-display">${getLastWeightEntry()}</span></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:6px;">
          <input id="weekly-weight-input" type="number" min="40" max="150" step="0.1"
            value="${ATHLETE_WEIGHT_KG}"
            style="width:72px;background:#111118;border:.5px solid rgba(200,240,96,0.35);border-radius:6px;color:var(--accent);font-family:var(--mono);font-size:14px;padding:6px 8px;text-align:center;outline:none;" />
          <span style="font-size:12px;color:var(--muted);">kg</span>
        </div>
        <button onclick="submitWeeklyWeight()" style="background:rgba(200,240,96,0.1);border:.5px solid rgba(200,240,96,0.4);border-radius:8px;padding:8px 16px;color:var(--accent);font-size:13px;cursor:pointer;min-height:40px;touch-action:manipulation;font-family:var(--mono);">Log weight</button>
        <button onclick="dismissWeightPrompt()" style="background:transparent;border:.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 14px;color:var(--muted);font-size:12px;cursor:pointer;min-height:40px;touch-action:manipulation;">Skip</button>
      </div>
    `;
    // Insert after the metrics grid (first child of dashboard)
    const metricsGrid = dashboard.querySelector('.metrics-grid');
    if (metricsGrid && metricsGrid.parentNode) {
      metricsGrid.parentNode.insertBefore(prompt, metricsGrid.nextSibling);
    } else {
      dashboard.insertBefore(prompt, dashboard.firstChild);
    }
  }

  function getLastWeightEntry() {
    const log = loadWeightLog();
    const entries = Object.entries(log).sort((a,b) => b[0].localeCompare(a[0]));
    if (entries.length === 0) return 'none — defaulting to 80kg';
    return entries[0][1] + 'kg on ' + new Date(entries[0][0]).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }

  window.submitWeeklyWeight = function() {
    const input = document.getElementById('weekly-weight-input');
    const kg = parseFloat(input?.value);
    if (!kg || kg < 40 || kg > 150) return;
    const todayStr = localDateKey(new Date());
    logWeight(kg, todayStr);
    localStorage.setItem('weight_prompt_last', todayStr);
    ATHLETE_WEIGHT_KG = kg;
    setAthleteWeight(kg);
    // Update W/kg card
    const wkgEl = document.getElementById('wkg-value');
    if (wkgEl) wkgEl.textContent = (ftp.watts / kg).toFixed(1);
    const wi = document.getElementById('weight-input');
    if (wi) wi.value = kg;
    // Refresh chart with new weight log
    pmcChart.update('none');
    // Remove prompt
    const p = document.getElementById('weight-prompt');
    if (p) p.remove();
    // Flash confirmation
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18181f;border:.5px solid rgba(200,240,96,0.5);border-radius:100px;padding:10px 20px;font-family:var(--mono);font-size:13px;color:var(--accent);z-index:9999;';
    flash.textContent = '✓ Weight logged: ' + kg + 'kg';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 2500);
  };

  window.dismissWeightPrompt = function() {
    const todayStr = localDateKey(new Date());
    localStorage.setItem('weight_prompt_last', todayStr);
    const p = document.getElementById('weight-prompt');
    if (p) p.remove();
  };

  // Seed 80kg as the historic baseline if no log exists yet
  (function seedHistoricWeight() {
    const log = loadWeightLog();
    if (Object.keys(log).length === 0) {
      // Seed 80kg from 90 days ago so the whole chart has a baseline
      const d = new Date(); d.setDate(d.getDate() - 90);
      log[localDateKey(d)] = 80;
      saveWeightLog(log);
    }
  })();

  // Register inline crosshair plugin (draws white vertical line on hover)
  Chart.register({
    id: 'crosshair',
    afterDraw(chart) {
      if (chart.tooltip?._active?.length) {
        const ctx = chart.ctx;
        const x = chart.tooltip._active[0].element.x;
        const topY = chart.scales.y.top;
        const bottomY = chart.scales.y.bottom;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, topY);
        ctx.lineTo(x, bottomY);
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.restore();
      }
    }
  });

  const pmcChart = new Chart(document.getElementById('pmc').getContext('2d'), {
    type:'line',
    data:{
      labels: sl.map(h => h.date.toLocaleDateString('en-GB',{day:'numeric',month:'short'})),
      datasets:[
        {
          label:'Fitness (CTL)',
          data: sl.map(h => h.ctl),
          borderColor:'#c8f060', borderWidth:2, tension:.4, pointRadius:0, fill:false,
          yAxisID:'y',
        },
        {
          label:'Fatigue (ATL)',
          data: sl.map(h => h.atl),
          borderColor:'rgba(240,160,240,0.85)', borderWidth:2, tension:.4, pointRadius:0, fill:false,
          yAxisID:'y',
        },
        {
          label:'Form (TSB)',
          data: sl.map(h => h.form),
          borderWidth:2.5, tension:.4, pointRadius:0, fill:false,
          segment:{ borderColor: ctx => formZoneColour((sl[ctx.p0DataIndex]?.form + sl[Math.min(ctx.p0DataIndex+1,sl.length-1)]?.form)/2) },
          borderColor:'#60d090',
          yAxisID:'y',
        },
      ]
    },
    options:{
      responsive:true,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:'#16161e', titleColor:'#6b6b80',
          bodyColor:'#f0f0f8', borderColor:'rgba(255,255,255,.1)', borderWidth:1,
          boxWidth: 10, boxHeight: 10,
          callbacks:{
            afterBody(items) {
              const idx = items[0]?.dataIndex ?? 0;
              const f = sl[idx]?.form ?? 0;
              const z = zone(f);
              return ['Zone: ' + z.label + ' (' + (f>0?'+':'') + Math.round(f) + ')'];
            },
            labelColor(item) {
              // Fitness — yellow-green
              if (item.datasetIndex === 0) {
                return { borderColor:'#c8f060', backgroundColor:'#c8f060' };
              }
              // Fatigue — pink-purple
              if (item.datasetIndex === 1) {
                return { borderColor:'rgba(240,160,240,0.85)', backgroundColor:'rgba(240,160,240,0.85)' };
              }
              // Form — zone colour (fully filled)
              if (item.datasetIndex === 2) {
                const f = sl[item.dataIndex]?.form ?? 0;
                const col = formZoneColour(f);
                return { borderColor: col, backgroundColor: col };
              }
              return undefined;
            }
          }
        },
        // crosshair registered globally above
      },
      scales:{
        x:{
          ticks:{ color:'#6b6b80', font:{family:"'DM Mono'",size:10}, maxTicksLimit:10 },
          grid:{ color:'rgba(255,255,255,.04)' }
        },
        y:{
          ticks:{ color:'#6b6b80', font:{family:"'DM Mono'",size:10} },
          grid:{ color:'rgba(255,255,255,.04)' }
        },
      }
    }
  });

  // ── Wire weight input → live update W/kg card + chart ─────────────────────
  const weightInput = document.getElementById('weight-input');
  const wkgValueEl  = document.getElementById('wkg-value');
  if (weightInput) {
    function applyWeight(kg) {
      if (!kg || kg < 30 || kg > 200) return;
      ATHLETE_WEIGHT_KG = kg;
      setAthleteWeight(kg);
      // Log today's weight
      const todayStr = localDateKey(new Date());
      logWeight(kg, todayStr);
      const newWkg = (ftp.watts / kg).toFixed(1);
      if (wkgValueEl) wkgValueEl.textContent = newWkg;
      // Update chart using weight log (null = use log, not override)
      pmcChart.update('none');
    }
    weightInput.addEventListener('input', function() {
      const v = parseFloat(this.value);
      if (v > 30 && v < 200) applyWeight(v);
    });
    weightInput.addEventListener('change', function() {
      applyWeight(parseFloat(this.value));
    });
  }

  // Show weekly weight prompt after a short delay
  setTimeout(checkWeeklyWeightPrompt, 800);
}

window.openGoalEdit = function(goalId) {
  const goals = loadGoals();
  let g;
  if (goalId) {
    g = goals.find(x => x.id === goalId) || { ...GOAL_DEFAULTS, id: makeGoalId(), priority:'B' };
  } else {
    // New goal — pick next available priority
    const used = goals.map(x => x.priority);
    const priority = ['A1','A2','A3','B','C'].find(p => !used.includes(p)) || 'C';
    g = { ...GOAL_DEFAULTS, name:'', date:'', id: makeGoalId(), priority };
  }
  const titleEl = document.getElementById('ge-form-title');
  if (titleEl) titleEl.textContent = goalId ? 'Edit Goal' : 'Add Goal';
  const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
  setVal('ge-id',       g.id || '');
  setVal('ge-name',     g.name);
  setVal('ge-date',     g.date);
  setVal('ge-dist',     g.distance);
  setVal('ge-elev',     g.elevation);
  setVal('ge-time',     g.timeGoal);
  setVal('ge-start',    g.startTime || '10:00');
  setVal('ge-loc',      g.location || '');
  setVal('ge-type',     g.raceType || 'mtb');
  setVal('ge-priority', g.priority || 'B');
  document.getElementById('goal-view').style.display = 'none';
  document.getElementById('goal-edit').style.display = 'block';
  updateGoalPreview();
};

window.applyGoalEdit = function() {
  const id  = document.getElementById('ge-id')?.value || makeGoalId();
  const g = {
    id,
    name:     document.getElementById('ge-name')?.value.trim()       || GOAL_DEFAULTS.name,
    date:     document.getElementById('ge-date')?.value              || GOAL_DEFAULTS.date,
    distance: parseFloat(document.getElementById('ge-dist')?.value)  || GOAL_DEFAULTS.distance,
    elevation:parseFloat(document.getElementById('ge-elev')?.value)  || GOAL_DEFAULTS.elevation,
    timeGoal: parseFloat(document.getElementById('ge-time')?.value)  || GOAL_DEFAULTS.timeGoal,
    startTime:document.getElementById('ge-start')?.value             || GOAL_DEFAULTS.startTime,
    location: document.getElementById('ge-loc')?.value.trim()        || GOAL_DEFAULTS.location,
    raceType: document.getElementById('ge-type')?.value              || GOAL_DEFAULTS.raceType,
    priority: document.getElementById('ge-priority')?.value          || 'A1',
  };

  const goals = loadGoals();

  // If this is an A goal, demote any existing A to B
  // A1/A2/A3 can coexist — no demotion needed

  const idx = goals.findIndex(x => x.id === g.id);
  if (idx >= 0) goals[idx] = g;
  else goals.push(g);

  // Sort: A first, then B, then C, then by date
  goals.sort((a,b) => {
    const p = {A:0,B:1,C:2};
    return (p[a.priority]||3) - (p[b.priority]||3) || new Date(a.date) - new Date(b.date);
  });
  saveGoals(goals);

  document.getElementById('goal-view').style.display = 'block';
  document.getElementById('goal-edit').style.display = 'none';

  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18181f;border:.5px solid rgba(200,240,96,0.5);border-radius:100px;padding:10px 20px;font-family:var(--mono);font-size:13px;color:var(--accent);z-index:9999;white-space:nowrap;';
  flash.textContent = '✓ ' + g.priority + ' Goal saved — ' + g.name;
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 3000);

  // Reload to reflect changes
  setTimeout(() => location.reload(), 400);
};

window.promoteGoal = function(goalId) {
  const goals = loadGoals();
  // Demote current A → B
  goals.forEach(g => { if (g.priority === 'A') g.priority = 'B'; });
  const target = goals.find(g => g.id === goalId);
  if (target) target.priority = 'A';
  const pOrd={A1:0,A2:1,A3:2,A:0,B:3,C:4};goals.sort((a,b)=>(pOrd[a.priority]??5)-(pOrd[b.priority]??5)||new Date(a.date)-new Date(b.date));
  saveGoals(goals);
  setTimeout(() => location.reload(), 200);
};

window.deleteGoal = function(goalId) {
  const goals = loadGoals().filter(g => g.id !== goalId);
  // Ensure there's always an A goal
  if (goals.length && !goals.find(g => g.priority&&g.priority.startsWith('A'))) goals[0].priority = 'A1';
  saveGoals(goals);
  setTimeout(() => location.reload(), 200);
};

// ── Step 3: simplified schedule — rest day + long days → auto-populate ────────
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_IDX = { Mon:0, Tue:1, Wed:2, Thu:3, Fri:4, Sat:5, Sun:6 };

// State for step 3
TE_STATE.restDay  = 'Mon';
TE_STATE.longDays = ['Sat','Sun']; // multi-select

// Core logic: given restDay + longDays, derive all 7 session assignments
function teComputeSchedule(restDay, longDays, includeStrength) {
  const rest  = DAY_IDX[restDay];
  const longs = longDays.map(d => DAY_IDX[d]).sort((a,b) => a-b);
  const longRide    = longs[0] !== undefined ? DAYS[longs[0]] : 'Sat';
  const recovRide   = longs[1] !== undefined ? DAYS[longs[1]] : DAYS[(longs[0]+1)%7] || 'Sun';

  // Remaining weekdays (not rest, not long ride days)
  const remaining = DAYS.filter(d => d !== restDay && !longDays.includes(d));

  // Place intervals: first two available remaining days, at least 2 apart
  let int1 = null, int2 = null, str1 = null, str2 = null;
  const candidates = remaining.filter(d => DAY_IDX[d] !== rest);

  // int1: first candidate after rest day
  for (const d of candidates) {
    if (!int1) { int1 = d; continue; }
    // int2: at least 2 days after int1
    if (Math.abs(DAY_IDX[d] - DAY_IDX[int1]) >= 2 && !int2) { int2 = d; break; }
  }
  // fallback if not enough spread
  if (!int1) int1 = candidates[0] || 'Tue';
  if (!int2) int2 = candidates.find(d => d !== int1) || 'Thu';

  // Strength days: between interval days if possible
  if (includeStrength) {
    const strCandidates = remaining.filter(d => d !== int1 && d !== int2);
    str1 = strCandidates[0] || int1;
    str2 = strCandidates[1] || int2;
  } else {
    // reuse interval days for extra riding
    str1 = int1; str2 = int2;
  }

  return { restDay, interval1Day: int1, interval2Day: int2,
           strength1Day: str1, strength2Day: str2,
           longRideDay: longRide, recoveryRideDay: recovRide };
}

  document.body.appendChild(tip);

  function attach() {
    document.querySelectorAll('.te-phil-card[data-tip-title]').forEach(function(card) {
      if (card._tipOk) return;
      card._tipOk = true;
      card.addEventListener('mouseenter', function(e) {
        tip.innerHTML = '<div style="font-size:13px;font-weight:500;color:var(--accent2);margin-bottom:8px;">' + card.dataset.tipTitle + '</div>' +
          '<div style="color:var(--muted);">' + card.dataset.tipBody + '</div>';
        tip.style.display = 'block';
        moveTip(e);
      });
      card.addEventListener('mousemove', moveTip);
      card.addEventListener('mouseleave', function() { tip.style.display = 'none'; });
    });
  }
  function moveTip(e) {
    const tw=tip.offsetWidth, th=tip.offsetHeight, vw=window.innerWidth, vh=window.innerHeight;
    let x=e.clientX+16, y=e.clientY+16;
    if (x+tw>vw-8) x=e.clientX-tw-16;
    if (y+th>vh-8) y=e.clientY-th-16;
    if (y<8) y=8;
    tip.style.left=x+'px'; tip.style.top=y+'px';
  }
  const obs = new MutationObserver(attach);
  obs.observe(document.body, {childList:true, subtree:true});
  attach();
})();

      rec = 'polarised-wakefield';
      reason = 'CTL ' + currentCtl + ' and ' + tc.hoursPerWeekBase + 'hr/week — you have the fitness and time for polarised training to pay off fully.';
    } else if (currentCtl >= 40) {
      rec = 'ultra-endurance';
      reason = 'CTL ' + currentCtl + ' — solid base. Ultra-endurance specificity will prepare you best for a 230km race.';
    } else {
      rec = 'progressive';
      reason = 'CTL ' + currentCtl + ' — building your base first with progressive overload will set the foundation for harder work later.';
    }
    reco.innerHTML = '🎯 <span style="color:var(--accent2);">Recommended for you:</span> <strong style="color:var(--text);">' + (PHIL_MAP[rec]?.label||rec) + '</strong> &nbsp;·&nbsp; ' + reason;
    // Pre-highlight recommended card
    setTimeout(function() {
      const card = document.querySelector('.te-phil-card[data-phil="'+rec+'"]');
      if (card && !TE_STATE.phil) { teSelectPhil(card); }
    }, 50);
  }

  // Pre-select saved values
  // Pre-select rest day
  TE_STATE.restDay = tc.restDay || 'Mon';
  TE_STATE.longDays = [tc.longRideDay || 'Sat', tc.recoveryRideDay || 'Sun'].filter((v,i,a) => a.indexOf(v)===i);

  setTimeout(function() {
    // Philosophy
    const savedPhil = Object.keys(PHIL_MAP).find(k => PHIL_MAP[k].coachingStyle===tc.coachingStyle && PHIL_MAP[k].intervalPhilosophy===tc.intervalPhilosophy);
    if (savedPhil) {
      const c = document.querySelector('.te-phil-card[data-phil="'+savedPhil+'"]');
      if (c) teSelectPhil(c);
    }
    // Effort
    const effortCard = document.querySelector('.te-effort-card[data-effort="'+(tc.effortLevel||'balanced')+'"]');
    if (effortCard) teSelectEffort(effortCard);
    // Week cap
    const capMap = {60:'tight',90:'normal',120:'flexible'};
    const capKey = capMap[tc.weekdaySessionCap] || 'normal';
    const weekCard = document.querySelector('.te-week-card[data-week="'+capKey+'"]');
    if (weekCard) teSelectWeek(weekCard);
    // Terrain
    const terrainCard = document.querySelector('.te-terrain-card[data-terrain="'+(tc.terrain||'mtb')+'"]');
    if (terrainCard) teSelectTerrain(terrainCard);
    // Hills
    const hillsCard = document.querySelector('.te-hills-card[data-hills="'+String(tc.hillsAvailable)+'"]');
    if (hillsCard) teSelectHills(hillsCard);
    // Gym
    const gymCard = document.querySelector('.te-gym-card[data-gym="'+String(tc.includeStrength)+'"]');
    if (gymCard) teSelectGym(gymCard);

    // Rest day button
    const restBtn = document.querySelector('.te-restday-btn[data-day="'+TE_STATE.restDay+'"]');
    if (restBtn) teSelectRestDay(restBtn);

    // Long day buttons
    TE_STATE.longDays.forEach(function(d) {
      const btn = document.querySelector('.te-longday-btn[data-day="'+d+'"]');
      if (btn) teToggleLongDay(btn);
    });
  }, 80);

  set('te-hoursbase',      tc.hoursPerWeekBase);
  set('te-restDay',        tc.restDay);
  set('te-interval1Day',   tc.interval1Day);
  set('te-interval2Day',   tc.interval2Day);
  set('te-strength1Day',   tc.strength1Day);
  set('te-strength2Day',   tc.strength2Day);
  set('te-longRideDay',    tc.longRideDay);
  set('te-recoveryRideDay',tc.recoveryRideDay);

  // Start on step 1
  teGoStep(1);
};

function saveToken(token, expiry) {
  try { localStorage.setItem(TOKEN_SK, token); localStorage.setItem(EXPIRY_SK, String(expiry)); } catch(e) {}

function getCachedToken() {
  try {
    const t = localStorage.getItem(TOKEN_SK);
    const e = parseInt(localStorage.getItem(EXPIRY_SK) || '0', 10);
    if (t && Date.now() / 1000 < e - 120) return t;

async function callWorker(payload) {
  if (!WORKER_URL || WORKER_URL.includes('YOUR_WORKER')) {
    throw new Error('WORKER_NOT_CONFIGURED');
  }
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('Worker returned ' + res.status);
  const data = await res.json();
  if (!data.access_token) throw new Error(data.message || 'No access_token');
  saveToken(data.access_token, data.expires_at);
  return data.access_token;
}

window.applyNewToken = function() {
  const input = document.getElementById('token-input');
  const token = (input?.value || '').trim();
  if (!token) return;
  saveToken(token, Math.floor(Date.now()/1000) + 21600);
  const banner = document.getElementById('token-banner');
  if (banner) banner.remove();
  document.getElementById('loading').style.display = 'block';
  document.getElementById('status-text').textContent = 'Loading...';
  loadAndRender(token);
};
